<!-- ============================================================================
     予約管理タブ（Supabase版）HTML — 元 src/admin.html #resvView を忠実に移植
     ・期間タブ（今日／今週／今後すべて）／絞り込み（アーティスト・問診ステータス）

<div id="resvView" style="display:none">
  <!-- 店舗切替（任意）。全店=owner/admin のみ。staff は自店に固定されるので隠してもよい -->

<div id="login" style="position:fixed;inset:0;background:#0b5c55;display:flex;align-items:center;justify-content:center;z-index:50;padding:24px">
  <div style="background:#fff;border-radius:14px;padding:24px;width:100%;max-width:340px;box-shadow:0 8px 30px rgba(0,0,0,.2)">
    <div style="font-size:16px;font-weight:800;color:#0b5c55;margin-bottom:14px">スタッフ ログイン</div>
    <input id="le" type="email" placeholder="メールアドレス" autocomplete="username" style="width:100%;box-sizing:border-box;padding:11px;border:1px solid #ccc;border-radius:9px;margin-bottom:10px;font-size:15px">
    <input id="lp" type="password" placeholder="パスワード" autocomplete="current-password" style="width:100%;box-sizing:border-box;padding:11px;border:1px solid #ccc;border-radius:9px;font-size:15px" onkeydown="if(event.key==='Enter')login()">
    <div id="lerr" style="color:#c2410c;font-size:12.5px;min-height:16px;margin-top:8px"></div>
    <button onclick="login()" style="width:100%;margin-top:10px;padding:12px;border:none;border-radius:9px;background:#0b5c55;color:#fff;font-weight:800;font-size:15px;cursor:pointer">ログイン</button>
  </div>
</div>
<script>
// ===== 設定・認証（poc 既存を踏襲）=====
var SB_URL = "https://stgarheuldubyrzdqzaq.supabase.co";
var SB_KEY = "sb_publishable_e5A9MJzOCvzsfWXBd9DLzg_Wa_hJ0qb";
var TOKEN  = ""; // ログイン後のアクセストークン。これが無いと予約・お客様名は読めない（RLSでPII保護）。
function hdr(){ return { "apikey": SB_KEY, "Authorization": "Bearer " + (TOKEN || SB_KEY) }; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
function ymd(d){ return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }
function hhmm(iso){ var d=new Date(iso); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }

// ログイン画面の再表示（resv-tab.js のエラー時フックから呼ばれる）
function showLogin(msg){
  var ov=document.getElementById("login"); if(ov) ov.style.display="flex";
  var e=document.getElementById("lerr"); if(e&&msg) e.textContent=msg;
}
// スタッフ ログイン（Supabase Auth・メール/パスワード）。成功で予約タブを表示して一覧を読む。
function login(){
  var email=(document.getElementById("le").value||"").trim(), pw=document.getElementById("lp").value||"";
  var err=document.getElementById("lerr");
  if(!email||!pw){ err.textContent="メールとパスワードを入力してください。"; return; }
  err.textContent="ログイン中…";
  fetch(SB_URL+"/auth/v1/token?grant_type=password",{ method:"POST", headers:{ "Content-Type":"application/json", "apikey":SB_KEY }, body:JSON.stringify({ email:email, password:pw }) })
    .then(function(r){ return r.json(); }).then(function(d){
      if(d&&d.access_token){
        TOKEN=d.access_token;
        document.getElementById("login").style.display="none";
        document.getElementById("resvView").style.display="";
        if(typeof initResvStoreBar==="function") initResvStoreBar();
        loadBoard();
      } else { err.textContent="ログインできませんでした（メール・パスワードをご確認ください）。"; }
    }).catch(function(e){ err.textContent="通信エラー："+(e&&e.message||e); });
}

/* ===== 予約管理タブ（移植）JS ===== */
/* ============================================================================
   予約管理タブ（Supabase版）JS
   ・google.script.run（GAS）を Supabase REST / RPC に置き換え。認証は poc/admin.html を踏襲。
   ・前提グローバル（poc/admin.html に既存）：SB_URL, SB_KEY, TOKEN, hdr(), esc(), ymd(), hhmm()
     ※ poc の hdr() は { apikey, Authorization: Bearer <TOKEN||SB_KEY> } を返す。
       予約・PII は TOKEN（Supabase Auth ログイン）がある時だけ読める（RLS staff_read_resv）。
   ・店舗 slug（all/kurume/hakata）→ stores.code → store_id へ橋渡し。owner/admin は all で全店。
   ・元UIのデータ形（it.uid, it.reservation_id, it.source, it.isNew, it.visitNo,
     it.questionnaireDone, it.outcome, it.time, it.name, it.menu, it.treatment, it.artist）を再現。
   ============================================================================ */

/* ---- 設定：店舗 slug → UUID キャッシュ（stores から1回だけ解決） ---- */
var STORE_MAP = null;        // { kurume:{id,name}, hakata:{id,name}, ... }
var BOARD_PERIOD = 'today';
var WD = ['日','月','火','水','木','金','土'];

/* poc に無ければ使う簡易ヘルパー（既にあれば重複定義は削ってよい） */
if (typeof ymd !== 'function') {
  window.ymd = function(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); };
}
if (typeof hhmm !== 'function') {
  window.hhmm = function(iso){ var d=new Date(iso); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); };
}

/* 選択中の店舗 slug。#resvStore があればそれ、無ければ既定 'kurume'（1店舗運用） */
function currentStoreSlug(){
  var sel = document.getElementById('resvStore');
  return (sel && sel.value) ? sel.value : 'kurume';
}

/* REST GET（PostgREST）。配列 JSON を返す */
function sbGet(path){
  return fetch(SB_URL + '/rest/v1/' + path, { headers: hdr() })
    .then(function(res){ return res.json().then(function(j){ if(!res.ok) throw new Error((j&&j.message)||('HTTP '+res.status)); return j; }); });
}
/* RPC POST。bodyはJSON。戻りは関数の戻り値（jsonb/void/uuid 等） */
function sbRpc(fn, body){
  return fetch(SB_URL + '/rest/v1/rpc/' + fn, {
    method:'POST',
    headers: Object.assign({ 'Content-Type':'application/json' }, hdr()),
    body: JSON.stringify(body || {})
  }).then(function(res){ return res.json().then(function(j){ if(!res.ok) throw new Error((j&&j.message)||('HTTP '+res.status)); return j; }); });
}

/* stores（code→id）を1回ロードしてキャッシュ。store セレクタの店舗名も補完 */
function ensureStoreMap(){
  if (STORE_MAP) return Promise.resolve(STORE_MAP);
  return sbGet('stores?select=id,name,code').then(function(rows){
    STORE_MAP = {};
    (rows||[]).forEach(function(s){ if(s.code) STORE_MAP[s.code] = { id:s.id, name:s.name }; });
    // 店舗セレクタの表示名を実データで上書き（任意）
    var sel = document.getElementById('resvStore');
    if (sel){
      for (var i=0;i<sel.options.length;i++){
        var v = sel.options[i].value;
        if (STORE_MAP[v]) sel.options[i].textContent = STORE_MAP[v].name;
      }
    }
    return STORE_MAP;
  });
}

/* slug → store_id（all は null＝全店。owner/admin のみ RLS が許可） */
function storeIdForSlug(slug){
  if (!slug || slug === 'all') return null;
  return (STORE_MAP && STORE_MAP[slug]) ? STORE_MAP[slug].id : null;
}

/* 期間 → [from, to)（JST境界）。元 rangeFor と同等 */
function rangeFor(p){
  var now = new Date(), t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (p === 'today'){ var e=new Date(t0); e.setDate(e.getDate()+1); return [t0,e]; }
  if (p === 'week'){ var e2=new Date(t0); e2.setDate(e2.getDate()+7); return [t0,e2]; }
  var e3=new Date(t0); e3.setDate(e3.getDate()+400); return [t0,e3]; // 今後すべて（便宜上400日先）
}

/* ===== 表示制御（poc 側に hideAllViews 等があればそれを使う） ===== */
function showReservations(el){
  if (typeof hideAllViews === 'function') hideAllViews();
  if (el && typeof setActiveNav === 'function') setActiveNav(el);
  document.getElementById('resvView').style.display = '';
  loadBoard();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function setPeriod(p){
  BOARD_PERIOD = p;
  var ts = document.querySelectorAll('.rtab[data-p]');
  for (var i=0;i<ts.length;i++) ts[i].classList.toggle('active', ts[i].getAttribute('data-p')===p);
  loadBoard();
}

/* ===== 予約ボードの取得（GAS adminListReservations の置き換え） =====
   reservations を PostgREST 埋め込みで artists(name,code)/menus(name) と一括取得。
   担当絞り込み・問診ステータス絞り込み・店舗スコープは PostgREST フィルタで実現。
   新規/N回目バッジは RPC visit_no を予約ごとに併走で算出。 */
function loadBoard(){
  var board = document.getElementById('resvBoard');
  board.innerHTML = '<div class="placeholder">読み込み中…</div>';

  ensureStoreMap().then(function(){
    fillNurseFilterFromServer(); // 絞り込みのアーティスト候補を埋める（非同期・並行）

    var slug   = currentStoreSlug();
    var storeId = storeIdForSlug(slug);
    var nurseId = document.getElementById('resvNurse').value;     // artists.id（uuid）
    var qStatus = document.getElementById('resvStatus').value;    // '' | q_pending | q_done

    var r = rangeFor(BOARD_PERIOD);
    var from = encodeURIComponent(ymd(r[0]) + 'T00:00:00+09:00');
    var to   = encodeURIComponent(ymd(r[1]) + 'T00:00:00+09:00');

    var path = 'reservations?select=' +
      'id,start_at,end_at,customer_name,phone,status,source,treatment_type,outcome,line_uid,' +
      'artist_id,menu_id,artists(name,code),menus(name)' +
      '&status=neq.cancelled' +
      '&start_at=gte.' + from + '&start_at=lt.' + to +
      '&order=start_at';

    if (storeId) path += '&store_id=eq.' + storeId;            // all のときは付けない＝全店（owner/admin）
    if (nurseId) path += '&artist_id=eq.' + nurseId;
    // 問診ステータス：questionnaire_done か否かで絞る（GASの q_done/q_pending 相当）
    if (qStatus === 'q_done')    path += '&status=eq.questionnaire_done';
    if (qStatus === 'q_pending') path += '&status=in.(pending_questionnaire,questionnaire_reminded)';

    sbGet(path).then(function(rows){
      rows = rows || [];
      // 新規/リピート判定（line_uid のある予約のみ RPC で来店回数を取る。電話予約は新規扱い）
      var jobs = rows.map(function(row){
        if (row.source === 'manual' || !row.line_uid) { row._visitNo = 1; return Promise.resolve(); }
        return sbRpc('visit_no', { p_line_uid: row.line_uid, p_store: row.store_id || storeId, p_before: row.start_at })
          .then(function(n){ row._visitNo = (typeof n === 'number') ? n : 1; })
          .catch(function(){ row._visitNo = 1; });
      });
      return Promise.all(jobs).then(function(){ renderBoard(rows); });
    }).catch(function(err){
      if (!TOKEN){ if (typeof showLogin==='function') showLogin('もう一度ログインしてください。'); return; }
      board.innerHTML = '<div class="placeholder">取得に失敗しました<br>'+esc(err&&err.message||err)+'</div>';
    });
  }).catch(function(err){
    board.innerHTML = '<div class="placeholder">店舗情報を取得できませんでした<br>'+esc(err&&err.message||err)+'</div>';
  });
}

/* GASの groups/items を作らず、取得行をクライアントで日付グルーピング＋カード描画。
   元 onBoardLoaded のカードHTML・バッジを完全踏襲。 */
function renderBoard(rows){
  document.getElementById('resvCount').textContent = rows.length + '件';
  var board = document.getElementById('resvBoard');
  if (!rows.length){ board.innerHTML = '<div class="placeholder">該当する予約はありません</div>'; return; }

  var byDate = {}, order = [];
  rows.forEach(function(r){ var d = ymd(new Date(r.start_at)); if(!byDate[d]){ byDate[d]=[]; order.push(d); } byDate[d].push(r); });

  board.innerHTML = order.map(function(d){
    var dd = new Date(d + 'T00:00:00+09:00');
    var label = (dd.getMonth()+1) + '月' + dd.getDate() + '日（' + WD[dd.getDay()] + '）';
    return '<div class="rgroup"><div class="rgroup-date">' + esc(label) + '</div>' +
      byDate[d].map(function(r){
        var it = mapRow(r);
        var manual = it.source === 'manual';
        var badge = manual
          ? '<span class="rb-rep">📞電話予約</span>'
          : (it.isNew ? '<span class="rb-new">🆕新規</span>' : '<span class="rb-rep">🔁'+esc(it.visitNo)+'回目</span>');
        var q = manual
          ? '<span class="rb-qok">📞 電話予約（問診は来店時）</span>'
          : (it.questionnaireDone ? '<span class="rb-qok">📋問診済み</span>' : '<span class="rb-qng">⏳問診 未記入</span>');
        var out = it.outcome === 'visited' ? ' <span class="rb-visited">✅来店済み</span>'
                : it.outcome === 'no_show' ? ' <span class="rb-noshow">⚠️無断キャンセル</span>' : '';
        var rid = esc(it.reservation_id);
        var acts = '<div class="rc-acts">' +
          ((it.questionnaireDone || manual) ? '' : '<button type="button" class="rbtn" data-act="remind" data-rid="'+rid+'">📨 問診リマインド</button>') +
          '<button type="button" class="rbtn" data-act="visited" data-rid="'+rid+'">✅ 来店済み</button>' +
          '<button type="button" class="rbtn" data-act="noshow" data-rid="'+rid+'">⚠️ 無断</button>' +
          '<button type="button" class="rbtn danger" data-act="cancel" data-rid="'+rid+'">❌ キャンセル</button>' +
          '</div>';
        return '<div class="rcard" data-uid="'+esc(it.uid)+'" data-rid="'+rid+'">' +
          '<div class="rc-time">'+esc(it.time||'—')+'</div>' +
          '<div class="rc-main">' +
            '<div class="rc-name">'+esc(it.name)+' '+badge+out+'</div>' +
            '<div class="rc-menu">'+esc(it.menu||'—')+(it.treatment?'（'+esc(it.treatment)+'）':'')+' ／ 担当：'+esc(it.artist||'—')+'</div>' +
            '<div class="rc-foot">'+q+'</div>' +
            acts +
          '</div></div>';
      }).join('') +
    '</div>';
  }).join('');
}

/* 1行の予約 → 元UIの item 形に正規化 */
function mapRow(r){
  return {
    reservation_id: r.id,
    uid: r.line_uid || '',                                  // カルテ遷移キー（無ければ遷移しない）
    source: r.source || 'line',
    time: hhmm(r.start_at) + '–' + hhmm(r.end_at),
    name: r.customer_name || '（名前なし）',
    menu: (r.menus && r.menus.name) || '—',
    artist: (r.artists && r.artists.name) || '—',
    treatment: r.treatment_type === 'retouch' ? 'リタッチ' : (r.treatment_type === 'new' ? '新規' : ''),
    questionnaireDone: r.status === 'questionnaire_done',
    outcome: r.outcome || '',
    visitNo: r._visitNo || 1,
    isNew: (r._visitNo || 1) <= 1
  };
}

/* アーティスト絞り込みの選択肢（稼働中のみ）。選択値は維持。店舗で絞る（全店は店舗フィルタ無し） */
function fillNurseFilterFromServer(){
  var slug = currentStoreSlug();
  var storeId = storeIdForSlug(slug);
  var path = 'artists?select=id,name&is_active=eq.true&order=name';
  if (storeId) path += '&store_id=eq.' + storeId;
  sbGet(path).then(function(rows){
    var sel = document.getElementById('resvNurse'); var cur = sel.value;
    sel.innerHTML = '<option value="">全アーティスト</option>' +
      (rows||[]).map(function(n){ return '<option value="'+esc(n.id)+'">'+esc(n.name)+'</option>'; }).join('');
    sel.value = cur;
  }).catch(function(){ /* 候補が取れなくても一覧は出す */ });
}

/* ===== 予約カードのクリック委譲（注入対策で data-* から取得） =====
   ボタンなら操作、カード本体タップなら顧客カルテへ（uid があるときだけ） */
document.getElementById('resvBoard').addEventListener('click', function(e){
  var btn = e.target.closest('.rbtn');
  if (btn){ handleBoardAction(btn.getAttribute('data-act'), btn.getAttribute('data-rid')); return; }
  var card = e.target.closest('.rcard'); if (!card) return;
  var uid = card.getAttribute('data-uid'); if (!uid) return;
  // カルテタブが別担当で実装される場合のフック。get_customer(uid) を呼ぶ想定。
  if (typeof showCustomers === 'function' && typeof selectCustomer === 'function'){
    showCustomers(document.querySelector('nav a'));
    selectCustomer(uid);
  }
});

/* ===== 予約カードの操作（GAS の各 admin* を RPC に置換） =====
   問診リマインド：set_status(reminded) ＋ LINE push（Edge Function）／
   来店済み：set_outcome(visited)／無断：set_outcome(no_show)／キャンセル：staff_cancel_reservation */
function handleBoardAction(act, rid){
  if (!rid) return;
  var plan = {
    remind:  { q:'このお客様に「問診リマインド」をLINEで送信しますか？',
               run:function(){ return sbRpc('set_status', { p_resv:rid, p_status:'questionnaire_reminded' })
                                 .then(function(){ return pushQuestionnaireReminder(rid); }); } },
    cancel:  { q:'この予約をキャンセルしますか？\nカレンダーの枠も解放します。\n（お客様への自動連絡はしません）',
               run:function(){ return sbRpc('staff_cancel_reservation', { p_resv:rid, p_reason:'staff_admin' }); } },
    visited: { q:'この予約を「来店済み」として記録しますか？',
               run:function(){ return sbRpc('set_outcome', { p_resv:rid, p_outcome:'visited' }); } },
    noshow:  { q:'この予約を「無断キャンセル」として記録しますか？',
               run:function(){ return sbRpc('set_outcome', { p_resv:rid, p_outcome:'no_show' }); } }
  };
  var m = plan[act]; if (!m) return;
  if (!window.confirm(m.q)) return;
  m.run()
    .then(function(){ loadBoard(); })
    .catch(function(err){ window.alert('できませんでした：' + (err&&err.message||err)); });
}

/* 問診リマインドの LINE push は Edge Function 経由（任意・未デプロイなら no-op）。
   Edge Function 名 'questionnaire-reminder' を Bearer(TOKEN) で叩く想定。 */
function pushQuestionnaireReminder(rid){
  return fetch(SB_URL + '/functions/v1/questionnaire-reminder', {
    method:'POST',
    headers: Object.assign({ 'Content-Type':'application/json' }, hdr()),
    body: JSON.stringify({ reservation_id: rid })
  }).then(function(res){ if(!res.ok){ /* Edge Function 未配備でも状態更新は成立させる */ } })
    .catch(function(){ /* 通知失敗は致命でない（状態は reminded 済み） */ });
}

/* ============================================================================
   電話予約（手動予約）— GAS adminBookingFormOptions / adminCreateManualReservation の置換
   選択肢：artists（稼働中）／menus（稼働中）／artist_menus（担当可能ペア）を REST で取得。
   登録：RPC create_manual_reservation（席数上限・no_overlap 排他制約・料金/時間算出はDB側）。
   ============================================================================ */
var MB_OPTS = null;     // { nurses:[{id,name}], menus:[{id,name}], certified:[{artist_id,menu_id}] }
var MB_LOADING = false;

function openManualBooking(){
  var f = document.getElementById('mbForm');
  var btn = document.getElementById('mbOpenBtn');
  if (f.style.display !== 'none'){ closeManualBooking(); return; }
  f.style.display = ''; btn.textContent = '✕ 入力をやめる';
  mbSetMsg('');
  if (!MB_OPTS && !MB_LOADING) loadManualOptions();
}
function closeManualBooking(){
  document.getElementById('mbForm').style.display = 'none';
  document.getElementById('mbOpenBtn').textContent = '📞 ＋ 電話予約を登録する';
}
function mbSetMsg(t, ok){
  var el = document.getElementById('mbMsg');
  el.textContent = t || ''; el.className = 'mb-msg' + (t ? (ok ? ' ok' : ' ng') : '');
}

/* 選択肢を Supabase から取得（店舗スコープで artists/artist_menus を絞る） */
function loadManualOptions(){
  MB_LOADING = true; mbSetMsg('選択肢を読み込み中…', true);
  ensureStoreMap().then(function(){
    var storeId = storeIdForSlug(currentStoreSlug());
    var artistsPath = 'artists?select=id,name&is_active=eq.true&order=name' + (storeId ? '&store_id=eq.'+storeId : '');
    var menusPath   = 'menus?select=id,name&is_active=eq.true&order=name';
    var pairPath    = 'artist_menus?select=artist_id,menu_id&is_certified=eq.true';
    return Promise.all([ sbGet(artistsPath), sbGet(menusPath), sbGet(pairPath) ]);
  }).then(function(res){
    MB_LOADING = false; mbSetMsg('');
    MB_OPTS = {
      nurses:    (res[0]||[]).map(function(a){ return { nurse_id:a.id, name:a.name }; }),
      menus:     (res[1]||[]).map(function(m){ return { menu_id:m.id, name:m.name }; }),
      certified: (res[2]||[]).map(function(p){ return { nurse_id:p.artist_id, menu_id:p.menu_id }; })
    };
    var ns = document.getElementById('mbNurse');
    ns.innerHTML = '<option value="">選択してください</option>' +
      MB_OPTS.nurses.map(function(n){ return '<option value="'+esc(n.nurse_id)+'">'+esc(n.name)+'</option>'; }).join('');
    mbOnNurseChange();
  }).catch(function(err){
    MB_LOADING = false; mbSetMsg('選択肢を取得できませんでした：' + (err&&err.message||err));
  });
}

/* 担当に応じてメニューを絞り込む（担当可能ペアが無ければ全メニュー） */
function mbOnNurseChange(){
  var nid = document.getElementById('mbNurse').value;
  var ms = document.getElementById('mbMenu');
  if (!MB_OPTS){ ms.innerHTML = '<option value="">先に担当アーティストを選んでください</option>'; return; }
  var menus = MB_OPTS.menus || [];
  if (nid){
    var allowed = {}; (MB_OPTS.certified||[]).forEach(function(c){ if(c.nurse_id===nid) allowed[c.menu_id]=1; });
    if (Object.keys(allowed).length > 0) menus = menus.filter(function(m){ return allowed[m.menu_id]; });
  }
  ms.innerHTML = '<option value="">選択してください</option>' +
    menus.map(function(m){ return '<option value="'+esc(m.menu_id)+'">'+esc(m.name)+'</option>'; }).join('');
}

/* 登録 → 成功でフォームを閉じてボード再読込（GAS submit と同等のUX） */
function submitManualBooking(){
  var name     = document.getElementById('mbName').value.trim();
  var nurseId  = document.getElementById('mbNurse').value;
  var menuId   = document.getElementById('mbMenu').value;
  var datetime = document.getElementById('mbDatetime').value;     // 'YYYY-MM-DDTHH:mm'（ローカル＝JST）
  if (!name){ mbSetMsg('お客様名を入力してください。'); return; }
  if (!nurseId){ mbSetMsg('担当アーティストを選んでください。'); return; }
  if (!menuId){ mbSetMsg('メニューを選んでください。'); return; }
  if (!datetime){ mbSetMsg('日時を入力してください。'); return; }

  var storeId = storeIdForSlug(currentStoreSlug());
  if (!storeId){ mbSetMsg('登録する店舗を選んでください（全店では登録できません）。'); return; }

  var startISO = datetime + ':00+09:00';   // datetime-local は JST 前提。+09:00 を明示
  var payload = {
    p_store: storeId,
    p_artist: nurseId,
    p_menu: menuId,
    p_customer_name: name,
    p_start: startISO,
    p_treatment_type: document.getElementById('mbTreatment').value,   // new / retouch
    p_reservation_type: document.getElementById('mbResvType').value,  // normal / monitor
    p_phone: document.getElementById('mbPhone').value.trim() || null,
    p_furigana: document.getElementById('mbFurigana').value.trim() || null,
    p_memo: document.getElementById('mbMemo').value.trim() || null
  };

  var btn = document.getElementById('mbSubmit');
  btn.disabled = true; btn.textContent = '登録中…'; mbSetMsg('登録中…', true);
  sbRpc('create_manual_reservation', payload)
    .then(function(newId){
      btn.disabled = false; btn.textContent = 'この内容で登録';
      mbSetMsg('✅ 登録しました（予約番号 ' + esc(newId) + '）', true);
      ['mbName','mbFurigana','mbPhone','mbDatetime','mbMemo'].forEach(function(id){ document.getElementById(id).value=''; });
      ['mbMenu','mbTreatment','mbResvType'].forEach(function(id){ document.getElementById(id).selectedIndex=0; });
      loadBoard();
      setTimeout(closeManualBooking, 1200);
    })
    .catch(function(err){
      btn.disabled = false; btn.textContent = 'この内容で登録';
      mbSetMsg('登録できませんでした（' + mbReason(err&&err.message||'') + '）。');
    });
}

/* DB の例外メッセージ（raise exception）を日本語に。 */
function mbReason(r){
  r = String(r||'');
  var m = {
    forbidden_store:'権限がありません（店舗スコープ外）',
    seat_full:'その時間は満席です',
    bad_outcome:'来店結果の値が不正です',
    bad_status:'問診ステータスの値が不正です',
    reservation_not_found:'予約が見つかりません'
  };
  // no_overlap_per_artist 排他制約違反（DB制約名を含む）
  if (/no_overlap_per_artist|exclusion|overlap/i.test(r)) return '同じ担当の予約と重複しています';
  for (var k in m){ if (r.indexOf(k) >= 0) return m[k]; }
  return r || '登録処理に失敗しました';
}

/* オーナー/管理者なら店舗バーを表示（current_staff で role を確認）。staff は1店固定なので隠す。
   showReservations の前後で1回呼べばよい。 */
function initResvStoreBar(){
  sbRpc('current_staff', {}).then(function(rows){
    var me = (rows && rows[0]) || null;
    var bar = document.getElementById('resvStoreBar');
    if (!bar) return;
    if (me && (me.role === 'owner' || me.role === 'admin')) bar.style.display = '';
    else bar.style.display = 'none';   // staff：自店固定（RLSが自店だけを返す）
  }).catch(function(){ /* 取れなければ非表示のまま＝自店運用 */ });
}
