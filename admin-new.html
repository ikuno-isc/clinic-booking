<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>予約管理（Supabase版・お試し）</title>
<style>
  :root{ --g:#0b5c55; --line:#e6eceb; --sub:#889; }
  *{box-sizing:border-box}
  body{margin:0;background:#f4f6f8;color:#222;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}
  .wrap{max-width:720px;margin:0 auto;background:#fff;min-height:100vh;}
  .hd{background:var(--g);color:#fff;padding:16px 18px;}
  .hd h1{margin:0;font-size:18px;}
  .speed{display:inline-block;background:#063;color:#bff0d6;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;margin-top:7px}
  .tabs{display:flex;gap:6px;padding:12px 18px 0}
  .tab{flex:1;text-align:center;padding:9px 0;border-radius:10px 10px 0 0;background:#eef2f1;color:#557;font-weight:700;font-size:13px;cursor:pointer}
  .tab.on{background:#fff;color:var(--g);box-shadow:0 -1px 0 var(--g) inset}
  .body{padding:14px 18px 40px}
  .count{font-size:12px;color:var(--sub);margin:2px 2px 12px}
  .grp{margin-bottom:16px}
  .grp-d{font-size:13px;font-weight:800;color:var(--g);border-bottom:2px solid #d7ebe8;padding:4px 2px 8px;margin-bottom:8px}
  .card{display:flex;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:11px 12px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .t{flex:0 0 64px;font-weight:800;color:var(--g);font-size:14px;line-height:1.35}
  .m{flex:1;min-width:0}
  .nm{font-size:15px;font-weight:700;margin-bottom:3px}
  .me{font-size:12.5px;color:#555;line-height:1.4}
  .ph{color:var(--sub);font-size:13px;padding:24px 0;text-align:center}
  .x{font-size:11px;background:#ffedd5;color:#c2410c;padding:1px 7px;border-radius:999px;font-weight:700}
  .cbtn{margin-top:8px;font-size:11.5px;font-weight:700;padding:5px 10px;border-radius:8px;border:1px solid #f0c8c2;background:#fdf3f1;color:#c2410c;cursor:pointer}
  .note{font-size:11px;color:#aab;margin-top:18px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <div class="hd">
    <h1>予約管理（スタッフ用）</h1>
    <span class="speed" id="speed">読み込み中…</span>
  </div>
  <div class="tabs">
    <span class="tab on" data-p="today" onclick="setP('today',this)">📅 今日</span>
    <span class="tab" data-p="week" onclick="setP('week',this)">今週</span>
    <span class="tab" data-p="all" onclick="setP('all',this)">今後すべて</span>
  </div>
  <div class="body" id="body"><div class="ph">読み込み中…</div></div>
</div>

<script>
var SB_URL = "https://stgarheuldubyrzdqzaq.supabase.co";
var SB_KEY = "sb_publishable_e5A9MJzOCvzsfWXBd9DLzg_Wa_hJ0qb";
var STORE_ID = "22222222-0000-0000-0000-000000000001";
var H = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };
var PERIOD = "today";
var WD = ["日","月","火","水","木","金","土"];
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function ymd(d){ return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }
function hhmm(iso){ var d=new Date(iso); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }

function rangeFor(p){
  var now=new Date(), t0=new Date(now.getFullYear(),now.getMonth(),now.getDate());
  if(p==="today"){ var e=new Date(t0); e.setDate(e.getDate()+1); return [t0,e]; }
  if(p==="week"){ var e2=new Date(t0); e2.setDate(e2.getDate()+7); return [t0,e2]; }
  var e3=new Date(t0); e3.setDate(e3.getDate()+400); return [t0,e3]; // 今後すべて（便宜上400日先まで）
}
function load(){
  var t0=performance.now();
  var r=rangeFor(PERIOD);
  var from=encodeURIComponent(ymd(r[0])+"T00:00:00+09:00");
  var to=encodeURIComponent(ymd(r[1])+"T00:00:00+09:00");
  // PostgRESTの埋め込みで担当名・メニュー名も一発で取得
  var path="reservations?select=id,start_at,end_at,customer_name,phone,status,artists(name),menus(name)"
    +"&store_id=eq."+STORE_ID+"&status=neq.cancelled"
    +"&start_at=gte."+from+"&start_at=lt."+to+"&order=start_at";
  fetch(SB_URL+"/rest/v1/"+path,{headers:H}).then(function(res){return res.json();}).then(function(rows){
    var ms=Math.round(performance.now()-t0);
    document.getElementById("speed").textContent="⚡ Supabase（東京）で "+ms+" ミリ秒で読み込み";
    render(rows||[]);
  }).catch(function(e){ document.getElementById("body").innerHTML='<div class="ph">取得に失敗しました：'+esc(e&&e.message||e)+'</div>'; });
}
function render(rows){
  var b=document.getElementById("body");
  if(!rows.length){ b.innerHTML='<div class="count">0件</div><div class="ph">該当する予約はありません</div>'; return; }
  var byDate={}, order=[];
  rows.forEach(function(r){ var d=ymd(new Date(r.start_at)); if(!byDate[d]){byDate[d]=[];order.push(d);} byDate[d].push(r); });
  var h='<div class="count">'+rows.length+'件</div>';
  order.forEach(function(d){
    var dd=new Date(d+"T00:00:00+09:00");
    h+='<div class="grp"><div class="grp-d">'+(dd.getMonth()+1)+'月'+dd.getDate()+'日（'+WD[dd.getDay()]+'）</div>';
    byDate[d].forEach(function(r){
      var art=r.artists&&r.artists.name||"—", menu=r.menus&&r.menus.name||"—";
      h+='<div class="card"><div class="t">'+hhmm(r.start_at)+'<br>–'+hhmm(r.end_at)+'</div><div class="m">'
        +'<div class="nm">'+esc(r.customer_name||"（名前なし）")+'</div>'
        +'<div class="me">'+esc(menu)+' ／ 担当：'+esc(art)+(r.phone?'　'+esc(r.phone):'')+'</div>'
        +'</div></div>';
    });
    h+='</div>';
  });
  h+='<div class="note">⚡ Supabase（東京）を直接読み込み。お客様の目の前でも一瞬で表示・操作できます。<br>※これはお試し版です。本番ではスタッフのログイン認証を付けます。</div>';
  b.innerHTML=h;
}
function setP(p,el){ PERIOD=p; var ts=document.querySelectorAll(".tab"); for(var i=0;i<ts.length;i++)ts[i].classList.toggle("on",ts[i]===el); document.getElementById("body").innerHTML='<div class="ph">読み込み中…</div>'; load(); }
load();
</script>
</body>
</html>
