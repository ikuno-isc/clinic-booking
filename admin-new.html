<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>管理ダッシュボード（Supabase版）</title>
<style>

  :root{ --g:#0b5c55; --line:#e6eceb; --sub:#889; }
  *{box-sizing:border-box}
  body{margin:0;background:#f4f6f8;color:#222;font-family:-apple-system,"Hiragino Sans","Yu Gothic",sans-serif;}
  .wrap{max-width:760px;margin:0 auto;background:#fff;min-height:100vh;}
  .hd{background:var(--g);color:#fff;padding:14px 18px;}
  .hd h1{margin:0;font-size:18px;}
  .speed{display:inline-block;background:#063;color:#bff0d6;font-size:11px;font-weight:700;border-radius:999px;padding:2px 9px;margin-top:7px}
  /* タブナビ */
  .nav{display:flex;gap:4px;padding:8px 10px;background:#f4f6f8;overflow-x:auto;position:sticky;top:0;z-index:10;border-bottom:1px solid var(--line);-webkit-overflow-scrolling:touch}
  .nav button{flex:0 0 auto;padding:8px 12px;border:none;border-radius:8px;background:#eef2f1;color:#557;font-weight:700;font-size:13px;cursor:pointer;white-space:nowrap}
  .nav button.active{background:var(--g);color:#fff}

/* ===== 予約管理 タブ CSS ===== */
/* ============================================================================
   予約管理タブ（Supabase版）CSS — 元 src/admin.html #resvView の見た目を完全再現
   ※ クラス名・配色・余白は原本そのまま。poc/admin.html の <head><style> 末尾に追記する。
   ============================================================================ */
#resvView{max-width:760px;margin:0 auto;padding:12px}
.resv-tabs{display:flex;gap:6px;margin-bottom:10px}
.rtab{flex:1;text-align:center;padding:9px 0;border-radius:10px;background:#eef2f1;color:#557;font-weight:700;font-size:14px;cursor:pointer}
.rtab.active{background:#0b5c55;color:#fff}
.resv-filters{display:flex;gap:8px;margin-bottom:8px}
.resv-filters select{flex:1;padding:8px;border:1px solid #d4dbda;border-radius:8px;font-size:13px;background:#fff}
.resv-count{font-size:12px;color:#888;margin:4px 2px 10px}
.placeholder{font-size:13px;color:#889;padding:24px 0;text-align:center}
.rgroup{margin-bottom:16px}
.rgroup-date{font-size:13px;font-weight:800;color:#0b5c55;padding:4px 2px 8px;border-bottom:2px solid #d7ebe8;margin-bottom:8px}
.rcard{display:flex;gap:10px;background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:11px 12px;margin-bottom:8px;cursor:pointer;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.rcard:active{background:#f6faf9}
.rc-time{flex:0 0 62px;font-weight:800;color:#0b5c55;font-size:14px;line-height:1.35}
.rc-main{flex:1;min-width:0}
.rc-name{font-size:15px;font-weight:700;color:#222;margin-bottom:3px}
.rc-menu{font-size:12.5px;color:#555;line-height:1.4}
.rc-foot{margin-top:5px}
.rb-new{font-size:11px;background:#e0f2fe;color:#0369a1;padding:1px 7px;border-radius:999px;font-weight:700}
.rb-rep{font-size:11px;background:#f1f5f3;color:#4b6;padding:1px 7px;border-radius:999px;font-weight:700}
.rb-qok{font-size:11px;color:#15803d;font-weight:700}
.rb-qng{font-size:11px;color:#c2410c;font-weight:700}
.rb-visited{font-size:11px;background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:999px;font-weight:700}
.rb-noshow{font-size:11px;background:#ffedd5;color:#c2410c;padding:1px 7px;border-radius:999px;font-weight:700}
.rc-acts{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}
.rbtn{font-size:11.5px;font-weight:700;padding:6px 10px;border-radius:8px;border:1px solid #cfe0dd;background:#f2f8f7;color:#0b5c55;cursor:pointer}
.rbtn:active{background:#e2f0ee}
.rbtn.danger{border-color:#f0c8c2;background:#fdf3f1;color:#c2410c}
/* 手動予約（電話予約）フォーム — 元CSSそのまま */
.mb-bar{margin:0 0 10px}
.mb-open{width:100%;padding:11px 0;border-radius:10px;border:1px dashed #59a89c;background:#f1faf8;color:#0b5c55;font-size:14px;font-weight:800;cursor:pointer}
.mb-open:active{background:#e2f0ee}
.mb-form{background:#fff;border:1px solid #d7e6e3;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.mb-form .mb-head{font-size:14px;font-weight:800;color:#0b5c55;margin-bottom:10px}
.mb-l{display:block;font-size:12px;font-weight:700;color:#445;margin:10px 0 4px}
.mb-req{font-size:10px;background:#fee2e2;color:#b91c1c;padding:1px 6px;border-radius:999px;margin-left:4px}
.mb-form input,.mb-form select,.mb-form textarea{width:100%;box-sizing:border-box;padding:9px;border:1px solid #d4dbda;border-radius:8px;font-size:14px;background:#fff;font-family:inherit}
.mb-form textarea{resize:vertical}
.mb-msg{font-size:12.5px;font-weight:700;margin:10px 0 2px;min-height:16px}
.mb-msg.ok{color:#15803d}.mb-msg.ng{color:#c2410c}
.mb-btns{display:flex;gap:8px;margin-top:12px}
.mb-cancel{flex:0 0 auto;padding:10px 16px;border-radius:9px;border:1px solid #d4dbda;background:#f4f6f5;color:#555;font-weight:700;font-size:13px;cursor:pointer}
.mb-submit{flex:1;padding:10px 0;border-radius:9px;border:none;background:#0b5c55;color:#fff;font-weight:800;font-size:14px;cursor:pointer}
.mb-submit:disabled{opacity:.55;cursor:default}
/* 店舗セレクタ（任意：複数店スタッフ向け。1店舗運用なら非表示でOK） */
.resv-storebar{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.resv-storebar label{font-size:12px;font-weight:700;color:#557}
.resv-storebar select{flex:1;padding:8px;border:1px solid #d4dbda;border-radius:8px;font-size:13px;background:#fff}

/* ===== customer タブ CSS ===== */
/* ============================================================================
   顧客カルテ（CRM）タブ CSS — 接頭辞 .crm- で名前空間を分離（既存 .rcard/.tab/.mb-… と非衝突）
   GAS版 src/admin.html の一覧＋カルテ体裁を踏襲（配色・余白・絵文字・並び）。
   ============================================================================ */
#custView{max-width:760px;margin:0 auto;padding:12px}

/* 一覧（左/上） */
.crm-listhead{margin-bottom:10px}
.crm-search{display:flex;align-items:center;gap:8px;background:#f3f4f6;border-radius:10px;padding:8px 10px}
.crm-search input{border:0;background:transparent;outline:none;font-size:15px;width:100%;font-family:inherit}
.crm-chips{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.crm-chip{font-size:12px;font-weight:700;padding:5px 11px;border-radius:999px;border:1px solid #e6eceb;background:#fff;color:#889;cursor:pointer;user-select:none}
.crm-chip.crm-active{background:#0b5c55;color:#fff;border-color:#0b5c55}
.crm-count{font-size:12px;color:#889;padding:8px 2px 4px}

.crm-list{list-style:none;margin:0;padding:6px 0}
.crm-cust{display:flex;gap:11px;align-items:center;padding:11px 10px;border-radius:12px;cursor:pointer}
.crm-cust:active,.crm-cust:hover{background:#f3faf8}
.crm-cust.crm-sel{background:#e6f6f3;outline:1px solid #b9e6df}
.crm-cav{width:42px;height:42px;border-radius:50%;flex:0 0 auto;display:grid;place-items:center;font-weight:800;color:#fff;font-size:16px}
.crm-cmain{flex:1 1 auto;min-width:0}
.crm-cnm{font-weight:800;font-size:15px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.crm-csub{font-size:12px;color:#889;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.crm-pill{font-size:11px;font-weight:800;padding:2px 9px;border-radius:999px;color:#fff;white-space:nowrap}
.crm-s-new{background:#2563eb}
.crm-s-rep{background:#16a34a}
.crm-s-att{background:#d97706}
.crm-s-vip{background:#9333ea}

/* 詳細（カルテ） */
.crm-back{display:none;align-items:center;gap:6px;background:#f1f5f9;border:1px solid #e6eceb;color:#222;border-radius:10px;padding:7px 12px;font-weight:800;font-size:13px;cursor:pointer;margin-bottom:10px}
.crm-back.crm-show{display:inline-flex}
.crm-dhead{padding:4px 2px 14px;border-bottom:1px solid #e6eceb;display:flex;gap:14px;align-items:center}
.crm-dhead .crm-cav{width:58px;height:58px;font-size:22px}
.crm-dtitle{flex:1 1 auto;min-width:0}
.crm-dtitle h2{margin:0;font-size:20px}
.crm-drow{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px}
.crm-ticket{font-size:12px;color:#889}
.crm-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 0}
.crm-stat{background:#f8fafa;border:1px solid #e6eceb;border-radius:12px;padding:10px 12px;text-align:center}
.crm-stat b{display:block;font-size:20px}
.crm-stat span{font-size:11px;color:#889}
.crm-sect{padding:6px 0 4px}
.crm-sect h3{font-size:12px;color:#889;font-weight:800;letter-spacing:.04em;margin:14px 0 6px;text-transform:uppercase}
.crm-next{margin:2px 0 4px;background:#ecfdf5;border:1px solid #a7f3d0;border-radius:12px;padding:11px 14px;font-size:14px;font-weight:800;color:#065f46}
.crm-next small{display:block;font-weight:700;color:#047857;font-size:11px;margin-bottom:2px}
.crm-cs-ok{font-size:13.5px;font-weight:800;color:#15803d;margin:2px 0 8px}
.crm-cs-ng{font-size:13.5px;font-weight:800;color:#c2410c;margin:2px 0 8px}
.crm-cs-when{font-size:12px;font-weight:400;color:#888;margin-left:4px}
.crm-memo{background:#fffdf5;border:1px solid #f3e9c7;border-radius:12px;padding:12px 14px;font-size:14px;white-space:pre-wrap;line-height:1.5}
.crm-timeline{margin:6px 0 4px;padding:0;list-style:none}
.crm-timeline li{position:relative;padding:6px 0 12px 20px;font-size:14px}
.crm-timeline li::before{content:"";position:absolute;left:4px;top:11px;width:9px;height:9px;border-radius:50%;background:#0b5c55}
.crm-timeline li::after{content:"";position:absolute;left:8px;top:18px;bottom:-2px;width:2px;background:#e6eceb}
.crm-timeline li:last-child::after{display:none}
.crm-timeline .crm-dt{font-size:12px;color:#889}
.crm-timeline .crm-tag{font-size:10px;font-weight:800;border-radius:6px;padding:1px 7px;margin-left:6px}
.crm-tag-v{background:#dcfce7;color:#15803d}
.crm-tag-n{background:#ffedd5;color:#c2410c}
.crm-tag-c{background:#f1f5f9;color:#64748b}
.crm-qrow{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.crm-qk{flex:0 0 42%;color:#888;line-height:1.4;word-break:break-word}
.crm-qv{flex:1;color:#222;white-space:pre-wrap;line-height:1.4;word-break:break-word}

/* フッタ操作（編集パネル） */
.crm-foot{padding:14px 0 24px}
.crm-edit{background:#fff;border:1px solid #d7e6e3;border-radius:12px;padding:14px;margin-top:8px}
.crm-edit h3{font-size:13px;font-weight:800;color:#0b5c55;margin:0 0 10px}
.crm-el{display:block;font-size:12px;font-weight:700;color:#445;margin:10px 0 4px}
.crm-edit textarea,.crm-edit select,.crm-edit input{width:100%;box-sizing:border-box;padding:9px;border:1px solid #d4dbda;border-radius:8px;font-size:14px;background:#fff;font-family:inherit}
.crm-edit textarea{resize:vertical}
.crm-row2{display:flex;gap:8px}
.crm-row2>div{flex:1}
.crm-save{margin-top:12px;width:100%;padding:10px 0;border-radius:9px;border:none;background:#0b5c55;color:#fff;font-weight:800;font-size:14px;cursor:pointer}
.crm-save:disabled{opacity:.55;cursor:default}
.crm-emsg{font-size:12.5px;font-weight:700;margin-top:10px;min-height:16px}
.crm-emsg.crm-ok{color:#15803d}
.crm-emsg.crm-ng{color:#c2410c}

.crm-placeholder{display:grid;place-items:center;min-height:40vh;color:#9ca3af;font-size:14px;text-align:center;padding:24px;line-height:1.6}

/* スマホ：一覧を先に、タップでカルテ。PCは縦並びでも崩れない単カラム構成 */
@media (max-width:860px){
  .crm-detail.crm-detail-show ~ .crm-listwrap{display:none}
}

/* ===== dashboard タブ CSS ===== */
/* ===== 経営ダッシュボード（dash- 接頭辞・既存 .tab/.rcard/.mb-/.rtab と非衝突） ===== */
#dashView{max-width:760px;margin:0 auto;padding:12px}
.dash-tabs{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.dash-tab{flex:1 1 22%;min-width:64px;text-align:center;padding:9px 0;border-radius:10px;background:#eef2f1;color:#557;font-weight:700;font-size:13.5px;cursor:pointer;user-select:none}
.dash-tab.active{background:#0b5c55;color:#fff}
.dash-period{font-size:13px;font-weight:800;color:#0b5c55;margin:2px 2px 12px}
.dash-kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:18px}
.dash-kpi{background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dash-kpi-v{font-size:19px;font-weight:800;color:#0b5c55;line-height:1.2}
.dash-kpi-l{font-size:11.5px;color:#888;margin-top:3px}
.dash-kpi.dash-kpi-main{grid-column:1 / -1;background:#0b5c55}
.dash-kpi.dash-kpi-main .dash-kpi-v{color:#fff;font-size:26px}
.dash-kpi.dash-kpi-main .dash-kpi-l{color:#bfe9e3}
.dash-kpi.dash-kpi-warn .dash-kpi-v{color:#c2410c}
.dash-sect{margin-bottom:18px}
.dash-sect h3{font-size:13px;font-weight:800;color:#0b5c55;border-bottom:2px solid #d7ebe8;padding-bottom:6px;margin:0 0 10px}
.dash-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.dash-row-l{flex:0 0 30%;font-size:12.5px;color:#333;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dash-bar{flex:1;height:14px;background:#eef2f1;border-radius:999px;overflow:hidden}
.dash-bar-fill{height:100%;background:#0b5c55;border-radius:999px}
.dash-bar-fill.dash-alt{background:#5eb0a6}
.dash-row-v{flex:0 0 auto;font-size:12px;font-weight:700;color:#0b5c55;text-align:right;min-width:74px}
.dash-row-sub{font-size:10.5px;color:#999;font-weight:400;margin-left:4px}
.dash-nrbar{display:flex;height:22px;border-radius:999px;overflow:hidden;background:#eef2f1}
.dash-nr-new{background:#38bdf8}
.dash-nr-rep{background:#0b5c55}
.dash-nr-legend{font-size:12px;color:#555;margin-top:7px}
.dash-empty{font-size:12px;color:#9ca3af;padding:6px 2px}
.dash-note{font-size:11px;color:#9ca3af;margin-top:6px;line-height:1.5}
.dash-placeholder{font-size:13px;color:#889;padding:24px 0;text-align:center}

/* ===== reviews タブ CSS ===== */
/* ===== 口コミ管理タブ（接頭辞 .rev- 専用。既存 .resv-/.rtab/.rcard/.rc-/.rb-/.mb-/.rbtn と非衝突）===== */
#reviewView{max-width:760px;margin:0 auto;padding:12px}
.rev-form{background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:14px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.rev-form h3{font-size:14px;font-weight:800;color:#0b5c55;margin:0 0 4px}
.rev-hint{font-size:11.5px;color:#999;margin:0 0 10px}
.rev-grid{display:flex;gap:8px;margin-bottom:8px}
.rev-form input,.rev-form select,.rev-form textarea{width:100%;padding:8px;border:1px solid #d4dbda;border-radius:8px;font-size:13px;box-sizing:border-box;font-family:inherit}
.rev-form textarea{margin-bottom:8px;resize:vertical}
.rev-form .rev-save{width:100%;padding:10px;background:#0b5c55;color:#fff;border:none;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;margin-top:4px}
.rev-form .rev-save:disabled{opacity:.55;cursor:default}
.rev-msg{font-size:12px;font-weight:700;min-height:16px;margin:2px 2px 0}
.rev-msg.ok{color:#15803d}.rev-msg.ng{color:#c2410c}
.rev-count{font-size:12px;color:#888;margin:4px 2px 10px}
.revcard{background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:12px 14px;margin-bottom:8px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.rev-top{display:flex;flex-wrap:wrap;align-items:center;gap:6px;margin-bottom:6px}
.rev-stars{color:#f59e0b;font-size:14px;letter-spacing:1px}
.rev-nurse{font-size:12px;color:#555}
.rev-store{font-size:10.5px;background:#e6f4f1;color:#0b5c55;padding:1px 8px;border-radius:999px;font-weight:700}
.rev-order{font-size:10.5px;color:#aab;margin-left:auto}
.rev-on{font-size:10.5px;background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:999px;font-weight:700}
.rev-off{font-size:10.5px;background:#f1f5f9;color:#94a3b8;padding:1px 7px;border-radius:999px;font-weight:700}
.rev-body{font-size:13px;color:#333;line-height:1.6;white-space:pre-wrap;margin-bottom:8px}
.rev-acts{display:flex;flex-wrap:wrap;gap:6px}
.rev-acts .rbtn{text-decoration:none;display:inline-block}

/* ===== settings タブ CSS ===== */
/* ===== 設定タブ（接頭辞 .set- で衝突回避） ===== */
#setView{max-width:760px;margin:0 auto;padding:12px}
.set-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.set-tab{font-size:12.5px;font-weight:700;color:#557;background:#eef2f1;border:1px solid #e0e8e6;border-radius:999px;padding:6px 12px;cursor:pointer;user-select:none}
.set-tab.set-on{background:#0b5c55;color:#fff;border-color:#0b5c55}
.set-sect{background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:6px 14px 10px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.set-sect h3{font-size:13px;font-weight:800;color:#0b5c55;margin:10px 0 6px}
.set-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid #f0f0f0;font-size:13px}
.set-row:last-child{border-bottom:none}
.set-l{color:#666;flex:0 0 auto}
.set-v{color:#222;text-align:right}
.set-okb{color:#15803d;font-weight:700;font-size:12.5px}
.set-ngb{color:#c2410c;font-weight:700;font-size:12.5px}
.set-note{font-size:11.5px;color:#9ca3af;margin:6px 4px 14px;line-height:1.6}
.set-ph{padding:28px 12px;text-align:center;color:#9ca3af;font-size:13px}
.set-err{color:#c2410c}
/* カード（メニュー／アーティスト／店舗・シフト共通） */
.set-card{background:#fff;border:1px solid #e6eceb;border-radius:12px;padding:12px 14px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.set-card.set-off{opacity:.55}
.set-card .set-name{font-weight:800;color:#1f2937;font-size:15px;margin-bottom:4px}
.set-tag{display:inline-block;font-size:11px;color:#557;background:#eef2f1;border-radius:6px;padding:1px 7px;margin-left:6px}
.set-tag.set-tagng{color:#c2410c;background:#fff3ec}
.set-meta{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:#444;margin-bottom:8px}
.set-meta b{color:#0b5c55}
.set-id{font-size:11px;color:#9ca3af;margin-top:2px}
.set-hint{font-size:11px;color:#9ca3af;margin-top:6px;line-height:1.5}
.set-now{font-size:15px;color:#1f2937;margin:6px 0 2px}
.set-now b{color:#0b5c55;font-size:17px}
.set-edit{display:none;margin-top:8px;border-top:1px dashed #e0e8e6;padding-top:8px}
.set-edit.set-open{display:block}
.set-edit label,.set-add label{display:block;font-size:12px;color:#666;margin:8px 0 3px}
.set-edit input,.set-add input{width:100%;box-sizing:border-box;padding:9px 10px;border:1px solid #cdd6d4;border-radius:9px;font-size:14px;background:#fff}
.set-chk{display:flex;align-items:center;gap:8px;font-size:13px;color:#1f2937;margin-top:10px}
.set-chk input{width:auto}
.set-acts{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.set-btn{flex:1;min-width:90px;padding:9px 0;border:none;border-radius:9px;font-weight:700;font-size:13px;cursor:pointer}

<script>
// ===== 設定・認証・共有ヘルパー（全タブ共通。各タブはこれを再定義しない）=====
var SB_URL    = "https://stgarheuldubyrzdqzaq.supabase.co";
var SB_KEY    = "sb_publishable_e5A9MJzOCvzsfWXBd9DLzg_Wa_hJ0qb";
var TENANT_ID = "11111111-1111-1111-1111-111111111111";
var TOKEN     = ""; // ログイン後のアクセストークン。これが無いとPIIは読めない（RLS保護）。
function hdr(){ return { "apikey": SB_KEY, "Authorization": "Bearer " + (TOKEN || SB_KEY) }; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\"/g,"&quot;"); }
function ymd(d){ return d.getFullYear()+"-"+("0"+(d.getMonth()+1)).slice(-2)+"-"+("0"+d.getDate()).slice(-2); }
function hhmm(iso){ var d=new Date(iso); return ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2); }

// 書込ヘルパー（PostgREST）。RLSが権限を判定（managerのみ等）。失敗はthrow。
function sbInsert(table, rows){
  return fetch(SB_URL+"/rest/v1/"+table,{ method:"POST",
    headers:Object.assign({"Content-Type":"application/json","Prefer":"return=representation"},hdr()), body:JSON.stringify(rows) })
    .then(function(res){ return res.text().then(function(t){ var j=null; try{j=t?JSON.parse(t):null;}catch(e){} if(!res.ok) throw new Error((j&&j.message)||("HTTP "+res.status)); return j; }); });
}
function sbUpdate(table, filter, patch){
  return fetch(SB_URL+"/rest/v1/"+table+"?"+filter,{ method:"PATCH",
    headers:Object.assign({"Content-Type":"application/json","Prefer":"return=representation"},hdr()), body:JSON.stringify(patch) })
    .then(function(res){ return res.text().then(function(t){ var j=null; try{j=t?JSON.parse(t):null;}catch(e){} if(!res.ok) throw new Error((j&&j.message)||("HTTP "+res.status)); return j; }); });
}
function sbDelete(table, filter){
  return fetch(SB_URL+"/rest/v1/"+table+"?"+filter,{ method:"DELETE", headers:hdr() })
    .then(function(res){ if(!res.ok) return res.text().then(function(t){ throw new Error(t||("HTTP "+res.status)); }); return true; });
}

// ===== ビュー切替（全タブ共通）=====
function hideAllViews(){ ["resvView","custView","dashView","reviewView","setView"].forEach(function(id){ var e=document.getElementById(id); if(e) e.style.display="none"; }); }
function setActiveNav(el){ var bs=document.querySelectorAll("#nav button"); for(var i=0;i<bs.length;i++) bs[i].classList.toggle("active", bs[i]===el); }

// ===== ログイン画面の再表示（各タブのエラーフックから呼ばれる）=====
function showLogin(msg){ var ov=document.getElementById("login"); if(ov) ov.style.display="flex"; var e=document.getElementById("lerr"); if(e&&msg) e.textContent=msg; }

// ===== スタッフ ログイン（Supabase Auth）。成功でナビを出し予約管理を表示 =====
function login(){
  var email=(document.getElementById("le").value||"").trim(), pw=document.getElementById("lp").value||"";
  var err=document.getElementById("lerr");
  if(!email||!pw){ err.textContent="メールとパスワードを入力してください。"; return; }
  err.textContent="ログイン中…";
  fetch(SB_URL+"/auth/v1/token?grant_type=password",{ method:"POST", headers:{ "Content-Type":"application/json", "apikey":SB_KEY }, body:JSON.stringify({ email:email, password:pw }) })
    .then(function(r){ return r.json(); }).then(function(d){
      if(d&&d.access_token){
        TOKEN=d.access_token;
        document.getElementById("login").style.display="none";
        document.getElementById("nav").style.display="";
        if(typeof initResvStoreBar==="function") initResvStoreBar();
        var first=document.querySelector("#nav button");
        showReservations(first);
      } else { err.textContent="ログインできませんでした（メール・パスワードをご確認ください）。"; }
    }).catch(function(e){ err.textContent="通信エラー："+(e&&e.message||e); });
}

/* ===== 予約管理 タブ JS ===== */
/* ============================================================================
   予約管理タブ（Supabase版）JS
   ・google.script.run（GAS）を Supabase REST / RPC に置き換え。認証は poc/admin.html を踏襲。
   ・前提グローバル（poc/admin.html に既存）：SB_URL, SB_KEY, TOKEN, hdr(), esc(), ymd(), hhmm()
     ※ poc の hdr() は { apikey, Authorization: Bearer <TOKEN||SB_KEY> } を返す。
       予約・PII は TOKEN（Supabase Auth ログイン）がある時だけ読める（RLS staff_read_resv）。
   ・店舗 slug（all/kurume/hakata）→ stores.code → store_id へ橋渡し。owner/admin は all で全店。
   ・元UIのデータ形（it.uid, it.reservation_id, it.source, it.isNew, it.visitNo,
     it.questionnaireDone, it.outcome, it.time, it.name, it.menu, it.treatment, it.artist）を再現。
   ============================================================================ */

/* ---- 設定：店舗 slug → UUID キャッシュ（stores から1回だけ解決） ---- */
var STORE_MAP = null;        // { kurume:{id,name}, hakata:{id,name}, ... }
var BOARD_PERIOD = 'today';
var WD = ['日','月','火','水','木','金','土'];

/* poc に無ければ使う簡易ヘルパー（既にあれば重複定義は削ってよい） */
if (typeof ymd !== 'function') {
  window.ymd = function(d){ return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2); };
}
if (typeof hhmm !== 'function') {
  window.hhmm = function(iso){ var d=new Date(iso); return ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2); };
}

/* 選択中の店舗 slug。#resvStore があればそれ、無ければ既定 'kurume'（1店舗運用） */
function currentStoreSlug(){
  var sel = document.getElementById('resvStore');
  return (sel && sel.value) ? sel.value : 'kurume';
}

/* REST GET（PostgREST）。配列 JSON を返す */
function sbGet(path){
  return fetch(SB_URL + '/rest/v1/' + path, { headers: hdr() })
    .then(function(res){ return res.json().then(function(j){ if(!res.ok) throw new Error((j&&j.message)||('HTTP '+res.status)); return j; }); });
}
/* RPC POST。bodyはJSON。戻りは関数の戻り値（jsonb/void/uuid 等） */
function sbRpc(fn, body){
  return fetch(SB_URL + '/rest/v1/rpc/' + fn, {
    method:'POST',
    headers: Object.assign({ 'Content-Type':'application/json' }, hdr()),
    body: JSON.stringify(body || {})
  }).then(function(res){ return res.text().then(function(t){
    // ★void を返すRPC(set_status/set_outcome/staff_cancel_reservation/save_artist_shifts 等)は
    //   本文が空(204)になる。res.json()だと空本文で例外→成功なのに失敗表示になるため text()で受ける。
    var j=null; try{ j=t?JSON.parse(t):null; }catch(e){}
    if(!res.ok) throw new Error((j&&j.message)||t||('HTTP '+res.status));
    return j;
  }); });
}

/* stores（code→id）を1回ロードしてキャッシュ。store セレクタの店舗名も補完 */
function ensureStoreMap(){
  if (STORE_MAP) return Promise.resolve(STORE_MAP);
  return sbGet('stores?select=id,name,code').then(function(rows){
    STORE_MAP = {};
    (rows||[]).forEach(function(s){ if(s.code) STORE_MAP[s.code] = { id:s.id, name:s.name }; });
    // 店舗セレクタの表示名を実データで上書き（任意）
    var sel = document.getElementById('resvStore');
    if (sel){
      for (var i=0;i<sel.options.length;i++){
        var v = sel.options[i].value;
        if (STORE_MAP[v]) sel.options[i].textContent = STORE_MAP[v].name;
      }
    }
    return STORE_MAP;
  });
}

/* slug → store_id（all は null＝全店。owner/admin のみ RLS が許可） */
function storeIdForSlug(slug){
  if (!slug || slug === 'all') return null;
  return (STORE_MAP && STORE_MAP[slug]) ? STORE_MAP[slug].id : null;
}

/* 期間 → [from, to)（JST境界）。元 rangeFor と同等 */
function rangeFor(p){
  var now = new Date(), t0 = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  if (p === 'today'){ var e=new Date(t0); e.setDate(e.getDate()+1); return [t0,e]; }
  if (p === 'week'){ var e2=new Date(t0); e2.setDate(e2.getDate()+7); return [t0,e2]; }
  var e3=new Date(t0); e3.setDate(e3.getDate()+400); return [t0,e3]; // 今後すべて（便宜上400日先）
}

/* ===== 表示制御（poc 側に hideAllViews 等があればそれを使う） ===== */
function showReservations(el){
  if (typeof hideAllViews === 'function') hideAllViews();
  if (el && typeof setActiveNav === 'function') setActiveNav(el);
  document.getElementById('resvView').style.display = '';
  loadBoard();
  window.scrollTo({ top:0, behavior:'smooth' });
}

function setPeriod(p){
  BOARD_PERIOD = p;
  var ts = document.querySelectorAll('.rtab[data-p]');
  for (var i=0;i<ts.length;i++) ts[i].classList.toggle('active', ts[i].getAttribute('data-p')===p);
  loadBoard();
}

/* ===== 予約ボードの取得（GAS adminListReservations の置き換え） =====
   reservations を PostgREST 埋め込みで artists(name,code)/menus(name) と一括取得。
   担当絞り込み・問診ステータス絞り込み・店舗スコープは PostgREST フィルタで実現。
   新規/N回目バッジは RPC visit_no を予約ごとに併走で算出。 */
function loadBoard(){
  var board = document.getElementById('resvBoard');
  board.innerHTML = '<div class="placeholder">読み込み中…</div>';

  ensureStoreMap().then(function(){
    fillNurseFilterFromServer(); // 絞り込みのアーティスト候補を埋める（非同期・並行）

    var slug   = currentStoreSlug();
    var storeId = storeIdForSlug(slug);
    var nurseId = document.getElementById('resvNurse').value;     // artists.id（uuid）
    var qStatus = document.getElementById('resvStatus').value;    // '' | q_pending | q_done

    var r = rangeFor(BOARD_PERIOD);
    var from = encodeURIComponent(ymd(r[0]) + 'T00:00:00+09:00');
    var to   = encodeURIComponent(ymd(r[1]) + 'T00:00:00+09:00');

    var path = 'reservations?select=' +
      'id,start_at,end_at,customer_name,phone,status,source,treatment_type,outcome,line_uid,' +
      'artist_id,menu_id,artists(name,code),menus(name)' +
      '&status=neq.cancelled' +
      '&start_at=gte.' + from + '&start_at=lt.' + to +
      '&order=start_at';

    if (storeId) path += '&store_id=eq.' + storeId;            // all のときは付けない＝全店（owner/admin）
    if (nurseId) path += '&artist_id=eq.' + nurseId;
    // 問診ステータス：questionnaire_done か否かで絞る（GASの q_done/q_pending 相当）
    if (qStatus === 'q_done')    path += '&status=eq.questionnaire_done';
    if (qStatus === 'q_pending') path += '&status=in.(pending_questionnaire,questionnaire_reminded)';

    sbGet(path).then(function(rows){
      rows = rows || [];
      // 新規/リピート判定（line_uid のある予約のみ RPC で来店回数を取る。電話予約は新規扱い）
      var jobs = rows.map(function(row){
        if (row.source === 'manual' || !row.line_uid) { row._visitNo = 1; return Promise.resolve(); }
        return sbRpc('visit_no', { p_line_uid: row.line_uid, p_store: row.store_id || storeId, p_before: row.start_at })
          .then(function(n){ row._visitNo = (typeof n === 'number') ? n : 1; })
          .catch(function(){ row._visitNo = 1; });
      });
      return Promise.all(jobs).then(function(){ renderBoard(rows); });
    }).catch(function(err){
      if (!TOKEN){ if (typeof showLogin==='function') showLogin('もう一度ログインしてください。'); return; }
      board.innerHTML = '<div class="placeholder">取得に失敗しました<br>'+esc(err&&err.message||err)+'</div>';
    });
  }).catch(function(err){
    board.innerHTML = '<div class="placeholder">店舗情報を取得できませんでした<br>'+esc(err&&err.message||err)+'</div>';
  });
}

/* GASの groups/items を作らず、取得行をクライアントで日付グルーピング＋カード描画。
   元 onBoardLoaded のカードHTML・バッジを完全踏襲。 */
function renderBoard(rows){
  document.getElementById('resvCount').textContent = rows.length + '件';
  var board = document.getElementById('resvBoard');
  if (!rows.length){ board.innerHTML = '<div class="placeholder">該当する予約はありません</div>'; return; }

  var byDate = {}, order = [];
  rows.forEach(function(r){ var d = ymd(new Date(r.start_at)); if(!byDate[d]){ byDate[d]=[]; order.push(d); } byDate[d].push(r); });

  board.innerHTML = order.map(function(d){
    var dd = new Date(d + 'T00:00:00+09:00');
    var label = (dd.getMonth()+1) + '月' + dd.getDate() + '日（' + WD[dd.getDay()] + '）';
    return '<div class="rgroup"><div class="rgroup-date">' + esc(label) + '</div>' +
      byDate[d].map(function(r){
        var it = mapRow(r);
        var manual = it.source === 'manual';
        var badge = manual
          ? '<span class="rb-rep">📞電話予約</span>'
          : (it.isNew ? '<span class="rb-new">🆕新規</span>' : '<span class="rb-rep">🔁'+esc(it.visitNo)+'回目</span>');
        var q = manual
          ? '<span class="rb-qok">📞 電話予約（問診は来店時）</span>'
          : (it.questionnaireDone ? '<span class="rb-qok">📋問診済み</span>' : '<span class="rb-qng">⏳問診 未記入</span>');
        var out = it.outcome === 'visited' ? ' <span class="rb-visited">✅来店済み</span>'
                : it.outcome === 'no_show' ? ' <span class="rb-noshow">⚠️無断キャンセル</span>' : '';
        var rid = esc(it.reservation_id);
        var acts = '<div class="rc-acts">' +
          ((it.questionnaireDone || manual) ? '' : '<button type="button" class="rbtn" data-act="remind" data-rid="'+rid+'">📨 問診リマインド</button>') +
          '<button type="button" class="rbtn" data-act="visited" data-rid="'+rid+'">✅ 来店済み</button>' +
          '<button type="button" class="rbtn" data-act="noshow" data-rid="'+rid+'">⚠️ 無断</button>' +
          '<button type="button" class="rbtn danger" data-act="cancel" data-rid="'+rid+'">❌ キャンセル</button>' +
          '</div>';
        return '<div class="rcard" data-uid="'+esc(it.uid)+'" data-rid="'+rid+'">' +
          '<div class="rc-time">'+esc(it.time||'—')+'</div>' +
          '<div class="rc-main">' +
            '<div class="rc-name">'+esc(it.name)+' '+badge+out+'</div>' +
            '<div class="rc-menu">'+esc(it.menu||'—')+(it.treatment?'（'+esc(it.treatment)+'）':'')+' ／ 担当：'+esc(it.artist||'—')+'</div>' +
            '<div class="rc-foot">'+q+'</div>' +
            acts +
          '</div></div>';
      }).join('') +
    '</div>';
  }).join('');
}

/* 1行の予約 → 元UIの item 形に正規化 */
function mapRow(r){
  return {
    reservation_id: r.id,
    uid: r.line_uid || '',                                  // カルテ遷移キー（無ければ遷移しない）
    source: r.source || 'line',
    time: hhmm(r.start_at) + '–' + hhmm(r.end_at),
    name: r.customer_name || '（名前なし）',
    menu: (r.menus && r.menus.name) || '—',
    artist: (r.artists && r.artists.name) || '—',
    treatment: r.treatment_type === 'retouch' ? 'リタッチ' : (r.treatment_type === 'new' ? '新規' : ''),
    questionnaireDone: r.status === 'questionnaire_done',
    outcome: r.outcome || '',
    visitNo: r._visitNo || 1,
    isNew: (r._visitNo || 1) <= 1
  };
}

/* アーティスト絞り込みの選択肢（稼働中のみ）。選択値は維持。店舗で絞る（全店は店舗フィルタ無し） */
function fillNurseFilterFromServer(){
  var slug = currentStoreSlug();
  var storeId = storeIdForSlug(slug);
  var path = 'artists?select=id,name&is_active=eq.true&order=name';
  if (storeId) path += '&store_id=eq.' + storeId;
  sbGet(path).then(function(rows){
    var sel = document.getElementById('resvNurse'); var cur = sel.value;
    sel.innerHTML = '<option value="">全アーティスト</option>' +
      (rows||[]).map(function(n){ return '<option value="'+esc(n.id)+'">'+esc(n.name)+'</option>'; }).join('');
    sel.value = cur;
  }).catch(function(){ /* 候補が取れなくても一覧は出す */ });
}

/* ===== 予約カードのクリック委譲（注入対策で data-* から取得） =====
   ボタンなら操作、カード本体タップなら顧客カルテへ（uid があるときだけ） */
document.getElementById('resvBoard').addEventListener('click', function(e){
  var btn = e.target.closest('.rbtn');
  if (btn){ handleBoardAction(btn.getAttribute('data-act'), btn.getAttribute('data-rid')); return; }
  var card = e.target.closest('.rcard'); if (!card) return;
  var uid = card.getAttribute('data-uid'); if (!uid) return;
  // カルテタブが別担当で実装される場合のフック。get_customer(uid) を呼ぶ想定。
  if (typeof showCustomers === 'function' && typeof selectCustomer === 'function'){
    showCustomers(document.querySelector('nav a'));
    selectCustomer(uid);
  }
});

/* ===== 予約カードの操作（GAS の各 admin* を RPC に置換） =====
   問診リマインド：set_status(reminded) ＋ LINE push（Edge Function）／
   来店済み：set_outcome(visited)／無断：set_outcome(no_show)／キャンセル：staff_cancel_reservation */
function handleBoardAction(act, rid){
  if (!rid) return;
  var plan = {
    remind:  { q:'このお客様に「問診リマインド」をLINEで送信しますか？',
               run:function(){ return sbRpc('set_status', { p_resv:rid, p_status:'questionnaire_reminded' })
                                 .then(function(){ return pushQuestionnaireReminder(rid); }); } },
    cancel:  { q:'この予約をキャンセルしますか？\nカレンダーの枠も解放します。\n（お客様への自動連絡はしません）',
               run:function(){ return sbRpc('staff_cancel_reservation', { p_resv:rid, p_reason:'staff_admin' }); } },
    visited: { q:'この予約を「来店済み」として記録しますか？',
               run:function(){ return sbRpc('set_outcome', { p_resv:rid, p_outcome:'visited' }); } },
    noshow:  { q:'この予約を「無断キャンセル」として記録しますか？',
               run:function(){ return sbRpc('set_outcome', { p_resv:rid, p_outcome:'no_show' }); } }
  };
  var m = plan[act]; if (!m) return;
  if (!window.confirm(m.q)) return;
  m.run()
    .then(function(){ loadBoard(); })
    .catch(function(err){ window.alert('できませんでした：' + (err&&err.message||err)); });
}

/* 問診リマインドの LINE push は Edge Function 経由（任意・未デプロイなら no-op）。
   Edge Function 名 'questionnaire-reminder' を Bearer(TOKEN) で叩く想定。 */
function pushQuestionnaireReminder(rid){
  return fetch(SB_URL + '/functions/v1/questionnaire-reminder', {
    method:'POST',
    headers: Object.assign({ 'Content-Type':'application/json' }, hdr()),
    body: JSON.stringify({ reservation_id: rid })
  }).then(function(res){ if(!res.ok){ /* Edge Function 未配備でも状態更新は成立させる */ } })
    .catch(function(){ /* 通知失敗は致命でない（状態は reminded 済み） */ });
}

/* ============================================================================
   電話予約（手動予約）— GAS adminBookingFormOptions / adminCreateManualReservation の置換
   選択肢：artists（稼働中）／menus（稼働中）／artist_menus（担当可能ペア）を REST で取得。
   登録：RPC create_manual_reservation（席数上限・no_overlap 排他制約・料金/時間算出はDB側）。
   ============================================================================ */
var MB_OPTS = null;     // { nurses:[{id,name}], menus:[{id,name}], certified:[{artist_id,menu_id}] }
var MB_LOADING = false;

function openManualBooking(){
  var f = document.getElementById('mbForm');
  var btn = document.getElementById('mbOpenBtn');
  if (f.style.display !== 'none'){ closeManualBooking(); return; }
  f.style.display = ''; btn.textContent = '✕ 入力をやめる';
  mbSetMsg('');
  if (!MB_OPTS && !MB_LOADING) loadManualOptions();
}
function closeManualBooking(){
  document.getElementById('mbForm').style.display = 'none';
  document.getElementById('mbOpenBtn').textContent = '📞 ＋ 電話予約を登録する';
}
function mbSetMsg(t, ok){
  var el = document.getElementById('mbMsg');
  el.textContent = t || ''; el.className = 'mb-msg' + (t ? (ok ? ' ok' : ' ng') : '');
}

/* 選択肢を Supabase から取得（店舗スコープで artists/artist_menus を絞る） */
function loadManualOptions(){
  MB_LOADING = true; mbSetMsg('選択肢を読み込み中…', true);
  ensureStoreMap().then(function(){
    var storeId = storeIdForSlug(currentStoreSlug());
    var artistsPath = 'artists?select=id,name&is_active=eq.true&order=name' + (storeId ? '&store_id=eq.'+storeId : '');
    var menusPath   = 'menus?select=id,name&is_active=eq.true&order=name';
    var pairPath    = 'artist_menus?select=artist_id,menu_id&is_certified=eq.true';
    return Promise.all([ sbGet(artistsPath), sbGet(menusPath), sbGet(pairPath) ]);
  }).then(function(res){
    MB_LOADING = false; mbSetMsg('');
    MB_OPTS = {
      nurses:    (res[0]||[]).map(function(a){ return { nurse_id:a.id, name:a.name }; }),
      menus:     (res[1]||[]).map(function(m){ return { menu_id:m.id, name:m.name }; }),
      certified: (res[2]||[]).map(function(p){ return { nurse_id:p.artist_id, menu_id:p.menu_id }; })
    };
    var ns = document.getElementById('mbNurse');
    ns.innerHTML = '<option value="">選択してください</option>' +
      MB_OPTS.nurses.map(function(n){ return '<option value="'+esc(n.nurse_id)+'">'+esc(n.name)+'</option>'; }).join('');
    mbOnNurseChange();
  }).catch(function(err){
    MB_LOADING = false; mbSetMsg('選択肢を取得できませんでした：' + (err&&err.message||err));
  });
}

/* 担当に応じてメニューを絞り込む（担当可能ペアが無ければ全メニュー） */
function mbOnNurseChange(){
  var nid = document.getElementById('mbNurse').value;
  var ms = document.getElementById('mbMenu');
  if (!MB_OPTS){ ms.innerHTML = '<option value="">先に担当アーティストを選んでください</option>'; return; }
  var menus = MB_OPTS.menus || [];
  if (nid){
    var allowed = {}; (MB_OPTS.certified||[]).forEach(function(c){ if(c.nurse_id===nid) allowed[c.menu_id]=1; });
    if (Object.keys(allowed).length > 0) menus = menus.filter(function(m){ return allowed[m.menu_id]; });
  }
  ms.innerHTML = '<option value="">選択してください</option>' +
    menus.map(function(m){ return '<option value="'+esc(m.menu_id)+'">'+esc(m.name)+'</option>'; }).join('');
}

/* 登録 → 成功でフォームを閉じてボード再読込（GAS submit と同等のUX） */
function submitManualBooking(){
  var name     = document.getElementById('mbName').value.trim();
  var nurseId  = document.getElementById('mbNurse').value;
  var menuId   = document.getElementById('mbMenu').value;
  var datetime = document.getElementById('mbDatetime').value;     // 'YYYY-MM-DDTHH:mm'（ローカル＝JST）
  if (!name){ mbSetMsg('お客様名を入力してください。'); return; }
  if (!nurseId){ mbSetMsg('担当アーティストを選んでください。'); return; }
  if (!menuId){ mbSetMsg('メニューを選んでください。'); return; }
  if (!datetime){ mbSetMsg('日時を入力してください。'); return; }

  var storeId = storeIdForSlug(currentStoreSlug());
  if (!storeId){ mbSetMsg('登録する店舗を選んでください（全店では登録できません）。'); return; }

  var startISO = datetime + ':00+09:00';   // datetime-local は JST 前提。+09:00 を明示
  var payload = {
    p_store: storeId,
    p_artist: nurseId,
    p_menu: menuId,
    p_customer_name: name,
    p_start: startISO,
    p_treatment_type: document.getElementById('mbTreatment').value,   // new / retouch
    p_reservation_type: document.getElementById('mbResvType').value,  // normal / monitor
    p_phone: document.getElementById('mbPhone').value.trim() || null,
    p_furigana: document.getElementById('mbFurigana').value.trim() || null,
    p_memo: document.getElementById('mbMemo').value.trim() || null
  };

  var btn = document.getElementById('mbSubmit');
  btn.disabled = true; btn.textContent = '登録中…'; mbSetMsg('登録中…', true);
  sbRpc('create_manual_reservation', payload)
    .then(function(newId){
      btn.disabled = false; btn.textContent = 'この内容で登録';
      mbSetMsg('✅ 登録しました（予約番号 ' + esc(newId) + '）', true);
      ['mbName','mbFurigana','mbPhone','mbDatetime','mbMemo'].forEach(function(id){ document.getElementById(id).value=''; });
      ['mbMenu','mbTreatment','mbResvType'].forEach(function(id){ document.getElementById(id).selectedIndex=0; });
      loadBoard();
      setTimeout(closeManualBooking, 1200);
    })
    .catch(function(err){
      btn.disabled = false; btn.textContent = 'この内容で登録';
      mbSetMsg('登録できませんでした（' + mbReason(err&&err.message||'') + '）。');
    });
}

/* DB の例外メッセージ（raise exception）を日本語に。 */
function mbReason(r){
  r = String(r||'');
  var m = {
    forbidden_store:'権限がありません（店舗スコープ外）',
    seat_full:'その時間は満席です',
    bad_outcome:'来店結果の値が不正です',
    bad_status:'問診ステータスの値が不正です',
    reservation_not_found:'予約が見つかりません'
  };
  // no_overlap_per_artist 排他制約違反（DB制約名を含む）
  if (/no_overlap_per_artist|exclusion|overlap/i.test(r)) return '同じ担当の予約と重複しています';
  for (var k in m){ if (r.indexOf(k) >= 0) return m[k]; }
  return r || '登録処理に失敗しました';
}

/* オーナー/管理者なら店舗バーを表示（current_staff で role を確認）。staff は1店固定なので隠す。
   showReservations の前後で1回呼べばよい。 */
function initResvStoreBar(){
  sbRpc('current_staff', {}).then(function(rows){
    var me = (rows && rows[0]) || null;
    // ★owner/admin か＝全タブ共通の編集権限フラグ（顧客カルテ等が参照）。
    window.IS_MANAGER = !!(me && (me.role === 'owner' || me.role === 'admin'));
    var bar = document.getElementById('resvStoreBar');
    if (!bar) return;
    bar.style.display = window.IS_MANAGER ? '' : 'none';   // staff：自店固定（RLSが自店だけを返す）
  }).catch(function(){ /* 取れなければ非表示のまま＝自店運用 */ });
}

/* ===== customer タブ JS ===== */
/* ============================================================================
   顧客カルテ（CRM）タブ JS — poc/admin.html の <script> 末尾に追記する。
   共有グローバル（再定義しない）：SB_URL,SB_KEY,TOKEN,hdr(),sbGet,sbRpc,sbInsert,
     sbUpdate,sbDelete,esc(),ymd(),hhmm(),currentStoreSlug,storeIdForSlug,
     ensureStoreMap,STORE_MAP,hideAllViews,setActiveNav,showLogin,TENANT_ID。
   ・予約管理タブ(resv-tab.js)が showCustomers(nav要素)＋selectCustomer(uid) を呼ぶ。
   ・全ての値出力は esc()。クリックは data-* 属性＋イベント委譲（インライン onclick に
     動的値を文字列連結しない）＝注入対策。

   【レビュー修正の要点】
   ・get_customer の reservations / next_reservation は to_jsonb(r.*)（生の予約行）で
     返るため、r.menus.name / r.artists.name は存在しない（常に undefined）。
     → menus / artists の id→name マップを別途ロードし、r.menu_id / r.artist_id で名称解決。
   ・一覧の店舗フィルタはサーバ側で付けず RLS に委ね、クライアントで store 一致 or NULL を許容
     （store_id=NULL のLINE顧客が脱落しないように。RLSが他店を遮断済みなので安全）。
   ============================================================================ */

/* ---- 状態 ---- */
var CRM_LIST = [];          // 一覧の生データ（customers 行）
var CRM_CARDS = {};         // line_uid -> get_customer の戻り（キャッシュ）
var CRM_FILTER = 'all';     // all | new | rep | att
var CRM_SELECTED = null;    // 選択中 line_uid
var CRM_SEARCH_T = null;    // 検索デバウンス
var CRM_COLORS = ['#0f766e','#7c3aed','#db2777','#2563eb','#ea580c','#0891b2','#65a30d','#9333ea'];

/* メニュー/アーティストの id→name マップ（get_customer の生予約行に名前が無いため自前解決）。
   RLS スコープで読める範囲のみ。1回ロードしてキャッシュ。 */
var CRM_MENU_MAP = null;    // { menu_id: name }
var CRM_ARTIST_MAP = null;  // { artist_id: name }

/* ---- 区分（customer_type）の表示ラベル。DBは自由文字列なので既知値を日本語化 ---- */
var CRM_TYPE_LABEL = { vip:'VIP', repeat:'常連', regular:'常連', new:'新規', prospect:'見込み', other:'その他' };
function crmTypeLabel(t){ if(t==null||t==='') return ''; return CRM_TYPE_LABEL[String(t)] || String(t); }

/* ---- 小ヘルパー（接頭辞付き：既存 initials/colorFor と衝突回避） ---- */
function crmInitials(name){ var n = String(name||'').replace(/\s/g,''); return n ? n.slice(0,1) : '?'; }
function crmHash(s){ var h=0; s=String(s); for(var i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))>>>0; } return h; }
function crmColor(uid){ return CRM_COLORS[crmHash(uid) % CRM_COLORS.length]; }
function crmYen(n){ var v=(typeof n==='number')?n:parseInt(n,10); if(!isFinite(v)) v=0; return '¥' + v.toLocaleString('ja-JP'); }
function crmDate(iso){ if(!iso) return '—'; var d=new Date(iso); if(isNaN(d.getTime())) return '—';
  return d.getFullYear()+'/'+('0'+(d.getMonth()+1)).slice(-2)+'/'+('0'+d.getDate()).slice(-2); }
function crmDateTime(iso){ if(!iso) return '—'; var d=new Date(iso); if(isNaN(d.getTime())) return '—';
  return crmDate(iso)+' '+hhmm(iso); }

/* メニュー/アーティスト名マップを1回だけロード（RLSスコープ内）。失敗しても空マップで続行。 */
function crmEnsureNameMaps(){
  if (CRM_MENU_MAP && CRM_ARTIST_MAP) return Promise.resolve();
  return Promise.all([
    sbGet('menus?select=id,name').catch(function(){ return []; }),
    sbGet('artists?select=id,name').catch(function(){ return []; })
  ]).then(function(res){
    CRM_MENU_MAP = {}; (res[0]||[]).forEach(function(m){ if(m && m.id) CRM_MENU_MAP[m.id] = m.name; });
    CRM_ARTIST_MAP = {}; (res[1]||[]).forEach(function(a){ if(a && a.id) CRM_ARTIST_MAP[a.id] = a.name; });
  });
}
function crmMenuName(id){ return (id && CRM_MENU_MAP && CRM_MENU_MAP[id]) ? CRM_MENU_MAP[id] : ''; }
function crmArtistName(id){ return (id && CRM_ARTIST_MAP && CRM_ARTIST_MAP[id]) ? CRM_ARTIST_MAP[id] : ''; }

/* 来店ステータスの区分（新規/常連/要対応/VIP）。human_status があれば最優先で「要対応」。 */
function crmStatusOf(c){
  if (c && c.human_status && String(c.human_status) !== '' && String(c.human_status) !== 'done') return 'att';
  var vt = c && (c.customer_type||'');
  if (vt === 'vip') return 'vip';
  var vc = (c && typeof c.visit_count === 'number') ? c.visit_count : 0;
  return vc >= 2 ? 'rep' : 'new';
}
function crmStatusPill(st){
  var map = { new:{t:'新規',c:'crm-s-new'}, rep:{t:'常連',c:'crm-s-rep'},
              att:{t:'要対応',c:'crm-s-att'}, vip:{t:'VIP',c:'crm-s-vip'} };
  var s = map[st] || map.new;
  return '<span class="crm-pill '+s.c+'">'+s.t+'</span>';
}

/* ===== タブ表示：必ず hideAllViews → setActiveNav → 表示 → 読込 ===== */
function showCustomers(el){
  if (typeof hideAllViews === 'function') hideAllViews();
  if (el && typeof setActiveNav === 'function') setActiveNav(el);
  document.getElementById('custView').style.display = '';
  crmBackToList();
  crmLoadList();
  window.scrollTo({ top:0, behavior:'smooth' });
}

/* ===== 一覧の取得（GAS adminListCustomers の置換）=====
   RLS が自テナント・自店に絞る。店舗フィルタはサーバに付けず RLS 任せ＋クライアントで
   store 一致 or NULL を許容（store_id=NULL のLINE顧客を落とさない）。 */
function crmLoadList(){
  var listEl = document.getElementById('crmList');
  listEl.innerHTML = '<li class="crm-placeholder" style="min-height:30vh">読み込み中…</li>';
  document.getElementById('crmCount').textContent = '';

  ensureStoreMap().then(function(){
    var kw = (document.getElementById('crmSearch').value || '').trim();

    var path = 'customers?select=id,line_uid,line_display_name,visit_count,last_visit_at,' +
      'customer_type,human_status,store_id&order=visit_count.desc';

    // 検索：LINE表示名の部分一致（ilike）。記号を除去し、空になったら条件を付けない。
    if (kw){
      var safe = kw.replace(/([%_*,()\\])/g, '');
      if (safe){
        path += '&line_display_name=ilike.' + encodeURIComponent('*' + safe + '*');
      }
    }

    // 要対応：human_status が NULL でない行を粗く絞る（最終判定はクライアント crmStatusOf）。
    if (CRM_FILTER === 'att'){
      path += '&human_status=not.is.null';
    }

    sbGet(path).then(function(rows){
      rows = rows || [];
      var slug = currentStoreSlug();
      var storeId = storeIdForSlug(slug);   // 'all' は null＝全店
      CRM_LIST = rows.filter(function(c){
        // 店舗スコープ：店舗指定時は「その店舗 or 店舗未設定(NULL)」のみ表示（RLSが他店は既に遮断済み）。
        if (storeId && c.store_id && c.store_id !== storeId) return false;
        // 区分/来店回数ベースの絞込（new/rep/att）。
        var st = crmStatusOf(c);
        if (CRM_FILTER === 'all') return true;
        if (CRM_FILTER === 'new') return st === 'new';
        if (CRM_FILTER === 'rep') return st === 'rep' || st === 'vip';
        if (CRM_FILTER === 'att') return st === 'att';
        return true;
      });
      crmRenderList();
    }).catch(function(err){
      if (!TOKEN){ if (typeof showLogin === 'function') showLogin('もう一度ログインしてください。'); return; }
      listEl.innerHTML = '<li class="crm-placeholder" style="min-height:30vh">一覧の取得に失敗しました<br>'+esc(err&&err.message||err)+'</li>';
    });
  }).catch(function(err){
    listEl.innerHTML = '<li class="crm-placeholder" style="min-height:30vh">店舗情報を取得できませんでした<br>'+esc(err&&err.message||err)+'</li>';
  });
}

function crmRenderList(){
  var slug = currentStoreSlug();
  var storeId = storeIdForSlug(slug);
  var scopeLbl = storeId ? ('（' + esc((STORE_MAP && STORE_MAP[slug] && STORE_MAP[slug].name) || slug) + '）') : '（全店）';
  document.getElementById('crmCount').textContent = CRM_LIST.length + '件 ' + scopeLbl;

  var listEl = document.getElementById('crmList');
  if (!CRM_LIST.length){
    listEl.innerHTML = '<li class="crm-placeholder" style="min-height:24vh">該当する顧客がいません</li>';
    return;
  }
  listEl.innerHTML = CRM_LIST.map(function(c){
    var uid = c.line_uid || '';
    var name = c.line_display_name || '（名前なし）';
    var st = crmStatusOf(c);
    var sel = (CRM_SELECTED === uid && uid) ? ' crm-sel' : '';
    var sub = '来店' + esc(c.visit_count || 0) + '回 ・ 最終 ' + esc(crmDate(c.last_visit_at));
    var typeLbl = crmTypeLabel(c.customer_type);
    if (typeLbl) sub += ' ・ ' + esc(typeLbl);
    // uid は data-uid に格納（onclick への動的連結はしない＝注入対策）
    return '<li class="crm-cust'+sel+'" data-uid="'+esc(uid)+'">' +
      '<div class="crm-cav" style="background:'+crmColor(uid)+'">'+esc(crmInitials(name))+'</div>' +
      '<div class="crm-cmain">' +
        '<div class="crm-cnm">'+esc(name)+' '+crmStatusPill(st)+'</div>' +
        '<div class="crm-csub">'+sub+'</div>' +
      '</div></li>';
  }).join('');
}

/* チップ絞込（区分/有人）。クリックは委譲で取る。 */
document.getElementById('crmChips').addEventListener('click', function(e){
