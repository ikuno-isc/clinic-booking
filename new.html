<!DOCTYPE html>
<!--
  poc/index.html — お客様向け予約ページ（Supabase版・本番UI）。
  ・見た目／UX／ステップ遷移は GAS版 web/index.html の5ステップ予約ウィザードをそのまま踏襲。
  ・データ接続だけ GAS API → Supabase に差し替え：
      担当・メニュー       … sbGet（artists / menus / artist_menus）でアーティストごとの担当コースを組み立て
      空き日／空き枠       … sbRpc('busy_ranges') ＋ stores の営業時間・刻み・施術時間からクライアントで算出
      予約確定             … sbRpc('create_public_reservation')（二重予約はDB側で物理的に防止）
      LINE通知             … Supabase Edge Function（notify-reservation）へ依頼
  ・?ref=（流入元タグ）を予約に記録、?store= で店舗slug切替（既定 kurume）、LIFFでお客様UID/お名前を取得。
  ・キャンセル(s-cancel)は実装済み（?mode=cancel：自分のLINE UIDの予約のみ my_reservations/cancel_my_reservation）。
  ・同意書(s-consent)は方式A（指で署名→画像保存）で実装済み（?mode=consent：本文＋写真Y/N＋署名→submit_consent）。
  ・※実顧客公開前に本人確認(LIFF IDトークン検証#92)を入れる前提。テスト＋対面署名運用では現状で可。
  ・GitHub Pages 等で配信する純粋な静的HTML。外部依存は LIFF SDK のCDNのみ。
-->
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ご予約</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; background:#f5f5f5; color:#222; line-height:1.6; }

    /* ===== Loading / Done ===== */
    #s-loading { min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; color:#888; font-size:14px; }
    #s-done { display:none; min-height:100vh; padding:60px 24px; text-align:center; }
    .done-icon { font-size:56px; margin-bottom:16px; }
    .done-title { font-size:20px; font-weight:700; color:#06845a; margin-bottom:10px; }
    .done-msg { font-size:14px; color:#555; line-height:1.8; }

    /* ===== Wizard ===== */
    #s-wizard { display:none; }

    /* ===== Header ===== */
    .app-hd { background:#06c755; color:#fff; padding:12px 16px; }
    .app-hd h1 { font-size:16px; font-weight:700; }
    .app-hd .sub { font-size:12px; opacity:.9; margin-top:1px; }

    /* ===== Progress ===== */
    .prog-wrap { background:#fff; padding:10px 16px 8px; border-bottom:1px solid #eee; }
    .prog-dots { display:flex; gap:5px; margin-bottom:4px; }
    .prog-dot { flex:1; height:4px; background:#e0e0e0; border-radius:2px; }
    .prog-dot.done { background:#06c755; }
    .prog-dot.act { background:#a8e8c0; }
    .prog-lbl { font-size:11px; color:#888; text-align:right; }

    /* ===== Content + Nav ===== */
    .step-wrap { padding:20px 16px 90px; max-width:480px; margin:0 auto; }
    .step-nav { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid #eee; padding:12px 16px; display:flex; gap:10px; z-index:20; }
    .s-title { font-size:17px; font-weight:700; margin-bottom:18px; }
    .s-sub { font-size:13px; color:#666; margin:-12px 0 16px; }

    /* ===== Nurse cards ===== */
    .nurse-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .nurse-card { background:#fff; border:2px solid #e0e0e0; border-radius:14px; padding:20px 12px 16px; text-align:center; cursor:pointer; transition:border-color .15s,background .15s; }
    .nurse-card.sel { border-color:#06c755; background:#f0fdf5; }
    .n-av { width:72px; height:72px; border-radius:50%; margin:0 auto 10px; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:800; color:#fff; overflow:hidden; }
    .n-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .n-nm { font-size:18px; font-weight:700; }
    .n-pr { font-size:12px; color:#06845a; margin-top:4px; }

    /* ===== Course list ===== */
    .course-list { display:flex; flex-direction:column; gap:10px; }
    .course-item { background:#fff; border:2px solid #e0e0e0; border-radius:10px; padding:14px 16px; cursor:pointer; display:flex; align-items:flex-start; gap:12px; }
    .course-item.sel { border-color:#06c755; background:#f0fdf5; }
    .c-rd { width:20px; height:20px; border-radius:50%; border:2px solid #ccc; flex-shrink:0; margin-top:2px; display:flex; align-items:center; justify-content:center; }
    .course-item.sel .c-rd { border-color:#06c755; background:#06c755; }
    .c-dot { width:7px; height:7px; border-radius:50%; background:#fff; }
    .c-body { flex:1; }
    .c-nm { font-size:14px; font-weight:600; line-height:1.4; }
    .c-pr { font-size:15px; font-weight:700; color:#06845a; margin-top:6px; }
    .c-dur { font-size:11px; color:#999; margin-top:3px; }

    /* ===== Artist accordion (STEP 1) ===== */
    .art-acc { display:flex; flex-direction:column; gap:14px; max-width:600px; margin:0 auto; }
    .art-card { background:#fff; border:2px solid #e0e0e0; border-radius:16px; overflow:hidden; transition:border-color .15s,box-shadow .15s; box-shadow:0 1px 4px rgba(0,0,0,.04); }
    .art-card.open { border-color:#06c755; box-shadow:0 3px 12px rgba(6,199,85,.12); }
    .art-hd { display:flex; align-items:center; gap:16px; padding:18px 18px; cursor:pointer; }
    .art-av { width:72px; height:72px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:26px; font-weight:800; color:#fff; overflow:hidden; }
    .art-av img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
    .art-meta { flex:1; }
    .art-nm { font-size:18px; font-weight:700; }
    .art-spec { font-size:12.5px; color:#777; margin-top:3px; line-height:1.45; }
    .art-pr { font-size:13px; color:#06845a; font-weight:700; margin-top:4px; }
    .art-chev { font-size:15px; color:#bbb; transition:transform .2s,color .2s; flex-shrink:0; }
    .art-card.open .art-chev { transform:rotate(180deg); color:#06c755; }
    .art-panel { border-top:1px solid #eee; padding:12px 0 14px; background:#fafafa; }
    .art-hint { font-size:11px; color:#999; margin:0 14px 10px; }
    /* コースは横スクロール（カルーセル）。次のカードが少し見えることで「横に動かせる」と伝える。 */
    .ac-list { display:flex; gap:10px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; padding:2px 14px 10px; scroll-padding-left:14px; }
    .ac-list::-webkit-scrollbar { height:4px; }
    .ac-list::-webkit-scrollbar-thumb { background:#d0d0d0; border-radius:2px; }
    .ac-item { scroll-snap-align:start; flex:0 0 76%; box-sizing:border-box; background:#fff; border:1px solid #e0e0e0; border-radius:12px; padding:14px; cursor:pointer; display:flex; flex-direction:column; }
    .ac-item:active { background:#f0fdf5; border-color:#06c755; }
    .ac-top { flex:1; }
    .ac-cta { margin-top:12px; text-align:center; font-size:13px; font-weight:700; color:#06845a; background:#eafaf0; border:1px solid #b6e7c9; border-radius:8px; padding:9px 4px; }
    .s1-hint { flex:1; text-align:center; font-size:12px; color:#999; padding:4px 0; }

    /* ===== Calendar ===== */
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .cal-btn { width:36px; height:36px; border:1px solid #ddd; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:22px; color:#444; flex-shrink:0; line-height:1; }
    .cal-btn:disabled { opacity:.25; cursor:default; }
    .cal-mo { font-size:16px; font-weight:700; }
    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; }
    .cal-dow { text-align:center; font-size:11px; font-weight:700; color:#aaa; padding:4px 0 6px; }
    .cal-dow:first-child { color:#e44; }
    .cal-dow:last-child { color:#44e; }
    .cal-day { aspect-ratio:1; display:flex; align-items:center; justify-content:center; font-size:13px; border-radius:50%; color:#ccc; cursor:default; }
    .cal-day.avail { color:#222; cursor:pointer; }
    .cal-day.avail:active { background:#e8f8ee; }
    .cal-day.avail.sun { color:#e44; }
    .cal-day.avail.sat { color:#44e; }
    .cal-day.today { font-weight:800; }
    .cal-day.sel { background:#06c755 !important; color:#fff !important; }
    .cal-day.phantom { visibility:hidden; }
    .cal-info { font-size:12px; color:#888; margin-top:10px; text-align:center; }

    /* ===== Time slots ===== */
    .dt-lbl { font-size:15px; font-weight:700; margin-bottom:14px; }
    .slot-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .slot-a { background:#fff; border:2px solid #06c755; border-radius:8px; color:#06845a; font-size:14px; font-weight:600; padding:10px 4px; text-align:center; cursor:pointer; }
    .slot-a.sel { background:#06c755; color:#fff; }
    .slot-a:active { background:#e0f7ea; }
    .slot-x { background:#f5f5f5; border:1px solid #e5e5e5; border-radius:8px; color:#ccc; font-size:18px; padding:10px 4px; text-align:center; }

    /* ===== Form ===== */
    .field { margin-bottom:18px; }
    .fl { display:block; font-size:14px; font-weight:600; margin-bottom:6px; }
    .req { color:#c00; margin-left:2px; }
    input[type=text], input[type=tel], textarea { width:100%; padding:12px; font-size:16px; border:1px solid #ccc; border-radius:8px; background:#fff; -webkit-appearance:none; font-family:inherit; }
    textarea { resize:vertical; }
    .ferr { font-size:12px; color:#c00; margin-top:4px; display:none; }
    .radios { display:flex; gap:8px; }
    .radios label { flex:1; text-align:center; padding:10px; border:2px solid #ddd; border-radius:8px; background:#fff; font-size:14px; cursor:pointer; }
    .radios input { display:none; }
    .radios label:has(input:checked) { border-color:#06c755; background:#f0fdf5; }
    .radios-v { display:flex; flex-direction:column; gap:8px; }
    .radios-v label { padding:10px 14px; border:2px solid #ddd; border-radius:8px; background:#fff; font-size:14px; display:flex; align-items:center; gap:10px; cursor:pointer; }
    .radios-v input[type=radio] { width:18px; height:18px; flex-shrink:0; }
    .radios-v label:has(input:checked) { border-color:#06c755; background:#f0fdf5; }

    /* ===== Summary ===== */
    .sum-box { background:#fff; border-radius:10px; padding:16px; margin-bottom:20px; }
    .s-row { display:flex; padding:8px 0; border-bottom:1px solid #f0f0f0; }
    .s-row:last-child { border-bottom:none; }
    .s-key { font-size:12px; color:#888; width:80px; flex-shrink:0; padding-top:1px; }
    .s-val { font-size:14px; font-weight:600; flex:1; }

    /* ===== Terms ===== */
    .sec-lbl { font-size:13px; font-weight:700; color:#06845a; border-left:3px solid #06c755; padding-left:8px; margin-bottom:12px; }
    .terms-box { height:180px; overflow-y:auto; border:1px solid #ccc; border-radius:8px; padding:12px 14px; font-size:12px; color:#444; background:#fff; line-height:1.75; }
    .terms-box p { margin-bottom:8px; }
    .terms-box ul { margin:4px 0 10px 18px; padding:0; }
    .terms-box li { margin-bottom:4px; }
    .t-hd { font-weight:700; color:#222; display:block; margin:10px 0 4px; }
    .t-sub { font-weight:700; color:#444; display:block; font-size:11px; margin:6px 0 2px; }
    .agree-row { display:flex; align-items:flex-start; gap:10px; margin-top:14px; }
    .agree-row input { width:18px; height:18px; flex-shrink:0; margin-top:2px; }
    .agree-row span { font-size:13px; color:#444; }

    /* ===== Buttons ===== */
    .btn { padding:14px; font-size:16px; font-weight:700; border-radius:10px; border:none; cursor:pointer; }
    .btn-p { flex:1; background:#06c755; color:#fff; }
    .btn-p:disabled { background:#b5d9c4; }
    .btn-bk { background:#f5f5f5; color:#555; border:1px solid #ddd; width:76px; flex-shrink:0; font-size:14px; }

    /* ===== Spinner / Error ===== */
    .ld-box { text-align:center; padding:36px 0; color:#888; font-size:13px; }
    .spinner { display:inline-block; width:26px; height:26px; border:3px solid #e0e0e0; border-top-color:#06c755; border-radius:50%; animation:spin .8s linear infinite; vertical-align:middle; margin-right:6px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg-err { background:#fdecea; color:#c00; padding:12px; border-radius:8px; font-size:13px; }
    .btn-retry { background:#06c755; color:#fff; border:none; border-radius:8px; padding:10px 28px; font-size:14px; font-weight:600; cursor:pointer; }

    /* ===== Cancel（お客様によるキャンセル） ===== */
    #s-cancel { display:none; }
    #s-cancel .step-wrap { min-height:60vh; }
    #s-consent { display:none; }
    #s-consent .step-wrap { min-height:50vh; }
    .cl-loading { text-align:center; color:#888; padding:48px 0; }
    .cl-intro { font-weight:700; color:#0b5c55; margin:0 4px 12px; }
    .cl-sub { font-weight:400; font-size:12px; color:#888; }
    .cl-late { font-size:12.5px; color:#c2410c; background:#fff7ed; border:1px solid #fed7aa; border-radius:8px; padding:8px 10px; line-height:1.5; }
    .cl-card { background:#fff; border:1px solid #e6eceb; border-radius:14px; padding:14px 16px; margin:0 0 12px; box-shadow:0 1px 3px rgba(0,0,0,.05); }
    .cl-dt { font-weight:800; font-size:16px; color:#1f2937; }
    .cl-meta { font-size:13px; color:#555; line-height:1.5; margin:4px 0 10px; }
    .cl-x { width:100%; background:#fdf3f1; color:#c2410c; border:1px solid #f0c8c2; }
    .cl-x:disabled { opacity:.6; }
    .cl-note { font-size:11.5px; color:#aab; margin:8px 4px; line-height:1.5; }
    .soon-box { text-align:center; padding:48px 16px; color:#666; }
    .soon-box .done-icon { font-size:46px; }

    /* ===== Consent（同意書：本文→写真Yes/No→指署名→送信） ===== */
    .cs-greet { font-size:14px; font-weight:700; color:#0b5c55; margin:0 2px 6px; }
    .cs-meta { font-size:12px; color:#888; margin:0 2px 14px; }
    .cs-read { height:300px; overflow-y:auto; border:1px solid #ccc; border-radius:8px; padding:14px 16px; font-size:12.5px; color:#333; background:#fff; line-height:1.8; -webkit-overflow-scrolling:touch; }
    .cs-read h3 { font-size:13px; margin:14px 0 4px; border-left:4px solid #06845a; padding-left:8px; color:#222; }
    .cs-read h3:first-child { margin-top:2px; }
    .cs-read p { margin:0 0 8px; }
    .cs-read ul { margin:4px 0 10px 18px; padding:0; }
    .cs-read li { margin-bottom:4px; }
    .cs-read .cs-sub { font-weight:700; margin:8px 0 2px; color:#444; }
    .cs-read .cs-note, .cs-read .cs-agree { font-weight:700; }
    .cs-read .cs-agree { margin:14px 0 2px; color:#0b5c55; }
    .cs-sec { font-size:13px; font-weight:700; color:#06845a; border-left:3px solid #06c755; padding-left:8px; margin:22px 0 6px; }
    .cs-photo-note { font-size:12px; color:#666; margin:0 2px 12px; line-height:1.7; }
    .cs-q { background:#fff; border:1px solid #e6eceb; border-radius:10px; padding:12px 14px; margin-bottom:10px; }
    .cs-q-label { font-size:13px; color:#333; margin-bottom:8px; line-height:1.5; }
    .cs-yn { display:flex; gap:8px; }
    .cs-yn button { flex:1; padding:9px 4px; font-size:14px; font-weight:600; border:2px solid #ddd; border-radius:8px; background:#fff; color:#555; cursor:pointer; font-family:inherit; }
    .cs-yn button.on-yes { border-color:#06c755; background:#06c755; color:#fff; }
    .cs-yn button.on-no { border-color:#c2410c; background:#fdf3f1; color:#c2410c; }
    .cs-sign-wrap { margin-top:6px; }
    .cs-sign-hd { display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
    .cs-sign-hd .lbl { font-size:13px; font-weight:700; color:#333; }
    .cs-sign-clear { background:#f5f5f5; color:#555; border:1px solid #ddd; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-family:inherit; }
    #consentCanvas { width:100%; height:200px; background:#fff; border:1px solid #bbb; border-radius:8px; touch-action:none; display:block; }
    .cs-sign-hint { font-size:11.5px; color:#999; margin:6px 2px 0; }
    .cs-submit-err { margin-top:12px; }
    .cs-done .done-icon { font-size:52px; margin-bottom:14px; }

    /* ===== 他院修正の注意（経験「有」のお客様にだけ確認画面で表示） ===== */
    .fix-note { background:#fff7e6; border:1.5px solid #f0a020; border-radius:10px; padding:13px 15px; margin:16px 0; font-size:12.5px; color:#8a4b00; line-height:1.75; }
    .fix-note-hd { font-weight:800; color:#b45309; font-size:14px; margin-bottom:7px; }
    .fix-note p { margin:0 0 6px; }
    .fix-note ul { margin:6px 0 0 18px; padding:0; }
    .fix-note li { margin-bottom:4px; }
  </style>
</head>
<body>

<div id="s-loading">
  <div><span class="spinner"></span>読み込み中…</div>
</div>

<div id="s-wizard">
  <div class="app-hd">
    <h1>ご予約</h1>
    <div class="sub" id="hSub"></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-dots" id="progDots"></div>
    <div class="prog-lbl" id="progLbl"></div>
  </div>
  <div class="step-wrap" id="sc"></div>
  <nav class="step-nav" id="sn"></nav>
</div>

<div id="s-done">
  <div class="done-icon">✅</div>
  <div class="done-title">ご予約を承りました</div>
  <div class="done-msg">確認のメッセージをLINEにお送りします。<br>お会いできるのを楽しみにしております。</div>
  <button class="btn btn-p" id="backBtn" onclick="backToTalk()" style="display:inline-block;margin-top:28px;padding-left:40px;padding-right:40px;">LINEのトークに戻る</button>
</div>

<!-- キャンセル(s-cancel)は実装済み（中身はJSが描画）。同意書(s-consent)はまだ準備中案内のみ。 -->
<div id="s-cancel">
  <div class="app-hd"><h1>ご予約のキャンセル</h1></div>
  <div class="step-wrap">
    <div id="cancelBody"><div class="cl-loading">ご予約を確認しています…</div></div>
  </div>
</div>

<div id="s-consent">
  <div class="app-hd"><h1>アートメイク同意書</h1></div>
  <div class="step-wrap">
    <div id="consentBody"><div class="cl-loading">同意書を読み込んでいます…</div></div>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
// ===== Supabase 接続設定（公開キー＝埋め込みOK・RLSで保護） =====
var SB_URL    = "https://stgarheuldubyrzdqzaq.supabase.co";
var SB_KEY    = "sb_publishable_e5A9MJzOCvzsfWXBd9DLzg_Wa_hJ0qb";
var STORE_ID  = "22222222-0000-0000-0000-000000000001"; // 久留米店（store slug=kurume の既定店舗）
var TENANT_ID = "11111111-1111-1111-1111-111111111111";
var LIFF_ID   = "2010236479-4ANlMg3d";
var STORE_NAME = "久留米";   // スタッフ通知の【店名】表示用（当面は久留米単店）。
// LINE連携：確定メッセージ・スタッフ通知は Supabase Edge Function（notify-reservation）に依頼。
var EDGE_NOTIFY = SB_URL + "/functions/v1/notify-reservation";

// LIFFは元のクエリ(?ref=...)を、環境によって location.search に直接、または ?liff.state=... に包んで渡す。
// 両方を見て確実に取り出す。
function getQueryParam(name){
  try{
    var sp = new URLSearchParams(location.search);
    var v = sp.get(name);
    if(v) return v;
    var ls = sp.get('liff.state');
    if(ls){
      var inner = new URLSearchParams(ls.charAt(0)==='?' ? ls.slice(1) : ls);
      var v2 = inner.get(name);
      if(v2) return v2;
    }
  }catch(e){}
  return null;
}
var STORE = getQueryParam('store') || 'kurume'; // 店舗slug（既定 kurume）。当面 STORE_ID は久留米店固定。
var MODE  = getQueryParam('mode')  || 'book';   // 'book'（予約）/ 'cancel'（実装済み）/ 'consent'（準備中）
var REF   = getQueryParam('ref')   || '';       // 流入元タグ（集客：?ref= で来た予約に記録）

// コース選択はイベント委譲（data-* から取得）。onclick に名前を文字列連結しない＝XSS/壊れ防止。
document.addEventListener('click', function(e){
  var it = (e.target && e.target.closest) ? e.target.closest('.ac-item') : null;
  if(!it) return;
  pickCourse(it.getAttribute('data-nid'), it.getAttribute('data-nm'),
             it.getAttribute('data-mid'), it.getAttribute('data-mn'),
             parseInt(it.getAttribute('data-pr'),10)||0, parseInt(it.getAttribute('data-du'),10)||0);
});

// 営業時間／刻みのフォールバック（stores が取れない場合のみ使用）
var DEF_OPEN_H = 9, DEF_CLOSE_H = 19, DEF_INTERVAL = 30;

var H = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };

// ===== Supabase REST / RPC =====
function sbGet(path){
  return fetch(SB_URL + "/rest/v1/" + path, { headers: H })
    .then(function(r){ return r.json().then(function(j){ return { ok:r.ok, status:r.status, data:j }; }); });
}
function sbRpc(fn, args){
  return fetch(SB_URL + "/rest/v1/rpc/" + fn, {
    method:"POST", headers: Object.assign({ "Content-Type":"application/json" }, H), body: JSON.stringify(args||{})
  }).then(function(r){ return r.json().then(function(j){ return { ok:r.ok, status:r.status, data:j }; }, function(){ return { ok:r.ok, status:r.status, data:null }; }); });
}
// ===== 本人確認つき操作（#92）：キャンセル・同意書は Edge Function(liff-action) 経由 =====
// LINEのIDトークン(st.idToken)を送り、サーバー側でLINEに照合→確認できた本人だけが実行できる。
// 戻り値は sbRpc と同じ { ok, status, data } 形（失敗時 data.message にエラー種別）。
// ※Supabase上の関数スラッグは super-api（表示名は liff-action）。エンドポイントはスラッグ側を使う。
var EDGE_LIFF = SB_URL + "/functions/v1/super-api";
function sbEdge(action, args){
  var body = Object.assign({ action: action, id_token: (st.idToken||'') }, args||{});
  // ★apikey/Authorization(anonキー)も送る＝Edge FunctionのVerify JWTがON/OFFどちらでも通る。
  //   本人確認はあくまでサーバ側のLINE IDトークン検証で担保（anonキーは公開前提・ゲート通過用）。
  return fetch(EDGE_LIFF, {
    method:"POST", headers: Object.assign({ "Content-Type":"application/json" }, H), body: JSON.stringify(body)
  }).then(function(r){
    return r.json().then(function(j){
      return { ok: !!(j && j.ok), status:r.status, data:(j ? j.data : null) };
    }, function(){ return { ok:false, status:r.status, data:null }; });
  });
}

// ===== ユーティリティ =====
function p2(n){ return n<10?'0'+n:''+n; }
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function isT(v){ if(v===true||v===1)return true; if(typeof v==='string'){var t=v.trim().toLowerCase();return t==='true'||t==='1';}return false; }
function okPhone(v){ return /^0\d{9,10}$/.test(v.replace(/[-\s]/g,'')); }
function showScr(id){
  ['s-loading','s-wizard','s-done','s-cancel','s-consent'].forEach(function(s){ document.getElementById(s).style.display='none'; });
  document.getElementById(id).style.display='block';
}
function ymd(d){ return d.getFullYear()+'-'+p2(d.getMonth()+1)+'-'+p2(d.getDate()); }
// "09:00:00" / "09:00" / 9 → 分(int)。不正なら fb。
function hmToMin(v, fb){
  if(v==null) return fb;
  if(typeof v==='number') return v*60;
  var m=String(v).match(/^(\d{1,2}):(\d{2})/);
  if(!m) return fb;
  return parseInt(m[1],10)*60+parseInt(m[2],10);
}

var AC=['#e07b54','#26a69a','#7c4dff','#1565c0'];

// コースの並び順：①眉セット ②眉通常価格 ③眉他院修正 ④眉リタッチ再来 ⑤リップセット ⑥リップ通常価格。
// 各グループ内は安い順（再来だけは「2回目→3回目」の回数順）。
function sortCourses(menus){
  function info(m){
    var nm=m.menu_name||'';
    var lip=nm.indexOf('リップ')>=0, ret=nm.indexOf('再来')>=0, fix=nm.indexOf('他院修正')>=0;
    var set=nm.indexOf('セット')>=0||nm.indexOf('割引コース')>=0;
    var base = lip ? (set?5:6) : (ret?4 : fix?3 : set?1 : 2);
    var sub;
    if(ret){ var mt=nm.match(/(\d+)回目/); sub=mt?parseInt(mt[1],10):99; }
    else { var p=parseInt(m.normal_price,10); sub=isNaN(p)?9999999:p; }
    return { base:base, sub:sub };
  }
  return menus.slice().sort(function(a,b){
    var ia=info(a), ib=info(b);
    return ia.base!==ib.base ? ia.base-ib.base : ia.sub-ib.sub;
  });
}

    // このアーティストが対応できるメニュー（認定済み）
    var cert=(st.options.certified||[]).filter(function(c){return String(c.nurse_id)===String(n.nurse_id)&&isT(c.is_certified);});
    var cm={}; cert.forEach(function(c){cm[String(c.menu_id)]=c;});
    var menus=sortCourses((st.options.menus||[]).filter(function(m){return cm[String(m.menu_id)];}));

    h+=av+'<div class="art-meta"><div class="art-nm">'+esc(n.name)+'</div>';
    if(specBits.length)h+='<div class="art-spec">'+esc(specBits.join('・'))+'</div>';
    if(minP)h+='<div class="art-pr">¥'+minP.toLocaleString()+'〜</div>';

    if(open){
      h+='<div class="art-panel"><div class="art-hint">コースを横にスライドして選べます。タップすると日時の選択へ進みます。</div>';
      h+='<div class="ac-list">';
      menus.forEach(function(m){
        var c=cm[String(m.menu_id)];
        var isRet=m.menu_name&&m.menu_name.indexOf('再来')>=0;

        var dt=dm>0?Math.floor(dm/60)+'時間'+(dm%60>0?dm%60+'分':''):'';
        var p=parseInt(m.normal_price,10);
        var pt=(!isNaN(p)&&p>0)?'¥'+p.toLocaleString()+'（税込）':'';
        h+='<div class="ac-item" data-nid="'+esc(n.nurse_id)+'" data-nm="'+esc(n.name)+'" data-mid="'+esc(m.menu_id)+'" data-mn="'+esc(m.menu_name)+'" data-pr="'+(p||0)+'" data-du="'+(dm||0)+'">';
        h+='<div class="ac-top"><div class="c-nm">'+esc(m.menu_name)+'</div>';
        if(pt)h+='<div class="c-pr">'+pt+'</div>';

// コース確定：アーティスト＋コースを一度に確定し、日付選択（STEP2）へ直行する。
function pickCourse(nid,nname,mid,mname,price,dur){
  st.nurseId=nid; st.nurseName=nname;
  st.menuId=mid; st.menuName=mname; st.menuPrice=price; st.menuDur=dur;
  st.menuType=(mname&&mname.indexOf('再来')>=0)?'retouch':'new';
  st.openArtist=nid;

  st.slCache={};
  go(2);
}

// ===== 店舗の営業時間／刻み／定休日 =====
// stores から取得（business_hours_start / business_hours_end / slot_interval_min / closed_days）。
// closed_days は自由記述文字列。曜日名（例「月曜」）や YYYY-MM-DD が含まれていれば該当日を除外する。
function storeOpenMin(){ return st.options&&st.options.openMin!=null ? st.options.openMin : DEF_OPEN_H*60; }
function storeCloseMin(){ return st.options&&st.options.closeMin!=null ? st.options.closeMin : DEF_CLOSE_H*60; }
function storeInterval(){ var v=st.options&&st.options.interval; return (v&&v>0)?v:DEF_INTERVAL; }
var DOWJA=['日','月','火','水','木','金','土'];
function parseClosed(s){
  // 戻り値 { dows:Set<0..6>, dates:Set<'YYYY-MM-DD'> }
  var dows=new Set(), dates=new Set();
  if(!s) return { dows:dows, dates:dates };
  var txt=String(s);
  // 個別日（YYYY-MM-DD / YYYY/MM/DD）
  (txt.match(/\d{4}[-\/]\d{1,2}[-\/]\d{1,2}/g)||[]).forEach(function(d){
    var m=d.match(/(\d{4})[-\/](\d{1,2})[-\/](\d{1,2})/);
    if(m) dates.add(m[1]+'-'+p2(parseInt(m[2],10))+'-'+p2(parseInt(m[3],10)));
  });
  // 曜日名
  for(var i=0;i<7;i++){ if(txt.indexOf(DOWJA[i])>=0) dows.add(i); }
  if(/日曜/.test(txt)) dows.add(0);
  if(/[Ss]un/.test(txt)) dows.add(0);
  if(/[Mm]on/.test(txt)) dows.add(1);
  if(/[Tt]ue/.test(txt)) dows.add(2);
  if(/[Ww]ed/.test(txt)) dows.add(3);
  if(/[Tt]hu/.test(txt)) dows.add(4);
  if(/[Ff]ri/.test(txt)) dows.add(5);
  if(/[Ss]at/.test(txt)) dows.add(6);
  return { dows:dows, dates:dates };
}
function isClosedDay(d){
  var c=st.options&&st.options.closed; if(!c) return false;
  if(c.dows.has(d.getDay())) return true;
  if(c.dates.has(ymd(d))) return true;
  return false;
}
// 予約可能な「候補日」か（今日〜45日先・定休日除外）。空き有無は別途 busy_ranges で判定。
function isBookableDay(d){
  if(d<TODAY) return false;
  if(d>MAX_DATE) return false;
  if(isClosedDay(d)) return false;
  return true;
}

// ===== STEP 3: 日付選択 =====
var DOW=['日','月','火','水','木','金','土'];
function s3(){
  var ms=p2(st.calMonth), dcnt=new Date(st.calYear,st.calMonth,0).getDate();
  var first=new Date(st.calYear,st.calMonth-1,1).getDay();
  var canPrev=!(st.calYear===INIT_Y&&st.calMonth===INIT_M);
  // 翌月以降に候補日が無ければ「次へ」を止める（45日上限）。
  var nextFirst=new Date(st.calYear,st.calMonth,1);
  var canNext=(nextFirst<=MAX_DATE);
  var h='<div class="s-title">日付を選んでください</div>';
  h+='<div class="cal-nav">';
  h+='<button class="cal-btn" onclick="calMv(-1)" '+(canPrev?'':'disabled')+'>&#8249;</button>';
  h+='<div class="cal-mo">'+st.calYear+'年'+st.calMonth+'月</div>';
  h+='<button class="cal-btn" onclick="calMv(1)" '+(canNext?'':'disabled')+'>&#8250;</button></div>';
  h+='<div class="cal-grid">';
  DOW.forEach(function(d){h+='<div class="cal-dow">'+d+'</div>';});
  for(var i=0;i<first;i++) h+='<div class="cal-day phantom"></div>';
  for(var d=1;d<=dcnt;d++){
    var ds=st.calYear+'-'+ms+'-'+p2(d);
    var dd=new Date(st.calYear,st.calMonth-1,d);
    var dow=(first+d-1)%7;
    var bookable=isBookableDay(dd);
    var avail=bookable&&st.availDates&&st.availDates.has(ds), isSel=ds===st.date;
    var cls='cal-day';
    if(isSel) cls+=' sel';
    else if(avail){ cls+=' avail'; if(dow===0)cls+=' sun'; else if(dow===6)cls+=' sat'; }
    if(dd.getTime()===TODAY.getTime())cls+=' today';
    var click=(avail)?' onclick="pickD(\''+ds+'\')"':'';
    h+='<div class="'+cls+'"'+click+'>'+d+'</div>';
  }
  h+='</div>';
  if(st.adErr){
    h+='<div class="msg-err">空き情報を取得できませんでした。電波の良い場所で、もう一度お試しください。<div style="margin-top:10px"><button class="btn-retry" onclick="retryAD()">再試行</button></div></div>';
  }else if(st.availDates===null){
    h+='<div class="ld-box"><span class="spinner"></span>空き情報を取得中…</div>';
    setTimeout(loadAD,0);
  }else if(st.availDates.size===0){
    h+='<div class="cal-info">今月は空き枠がありません。'+(canNext?'翌月をご確認ください。':'別の条件をご確認ください。')+'</div>';
  }
  document.getElementById('sc').innerHTML=h;
  document.getElementById('sn').innerHTML='<button class="btn btn-bk" onclick="go(1)">戻る</button><button class="btn btn-p" onclick="st.date&&go(3)" '+(st.date?'':'disabled')+'>次へ</button>';
}
function calMv(dir){
  st.calMonth+=dir;
  if(st.calMonth>12){st.calMonth=1;st.calYear++;}
  if(st.calMonth<1){st.calMonth=12;st.calYear--;}
  st.availDates=null; st.adErr=false; s3();
}

// 表示中の月で「候補日」を集め、各日の busy_ranges から1枠でも空けば available_dates に入れる。
// busy_ranges は月の全予約をまとめて1回取得し、クライアントで日別に振り分ける（高速・PII非取得）。
function loadAD(){
  var reqN=st.nurseId, reqM=st.menuId, reqY=st.calYear, reqMo=st.calMonth;
  // 月内の候補日リスト
  var dcnt=new Date(reqY,reqMo,0).getDate();
  var cand=[];
  for(var d=1;d<=dcnt;d++){ var dd=new Date(reqY,reqMo-1,d); if(isBookableDay(dd)) cand.push(ymd(dd)); }
  if(!cand.length){
    if(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqM)&&st.calYear===reqY&&st.calMonth===reqMo){
      st.availDates=new Set(); st.adErr=false; if(st.step===2)s3();
    }
    return;
  }
  // 月初〜月末の予約を一括取得（JST境界）。
  var pFrom=reqY+'-'+p2(reqMo)+'-01T00:00:00+09:00';
  var endD=new Date(reqY,reqMo,1); // 翌月1日
  var pTo=endD.getFullYear()+'-'+p2(endD.getMonth()+1)+'-01T00:00:00+09:00';
  sbRpc('busy_ranges',{ p_artist:reqN, p_from:pFrom, p_to:pTo }).then(function(r){
    var same=(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqM)&&st.calYear===reqY&&st.calMonth===reqMo);
    if(!r.ok){ if(same){ st.adErr=true; if(st.step===2)s3(); } return; }
    var busyByDay={};
    (r.data||[]).forEach(function(x){
      var s=new Date(x.start_at).getTime(), e=new Date(x.end_at).getTime();
      // 予約をその開始日（JST）に振り分け
      var key=jstDateKey(x.start_at);
      (busyByDay[key]=busyByDay[key]||[]).push([s,e]);
    });
    var set=new Set();
    cand.forEach(function(ds){
      var slots=computeSlots(ds, busyByDay[ds]||[]);
      if(slots.some(function(s){return s.available;})) set.add(ds);
    });
    if(same){ st.availDates=set; st.adErr=false; if(st.step===2)s3(); }
  }).catch(function(){
    if(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqM)&&st.calYear===reqY&&st.calMonth===reqMo){
      st.adErr=true; if(st.step===2)s3();
    }
  });
}
// ISO日時(+09:00やZ)を JSTの 'YYYY-MM-DD' に変換（日別振り分け用）。
function jstDateKey(iso){
  var d=new Date(iso);
  var j=new Date(d.getTime()+9*3600000);
  return j.getUTCFullYear()+'-'+p2(j.getUTCMonth()+1)+'-'+p2(j.getUTCDate());
}
// 「再試行」ボタン：エラー状態を解除して空き情報を取り直す。
function retryAD(){ st.adErr=false; st.availDates=null; s3(); }
function pickD(ds){ st.date=ds; st.time=null; st.slots=null; st.slErr=false; s3(); prefetchSl(); }

// ===== 空き枠計算（GAS版 loadSlots と同じ考え方） =====
// 店舗営業時間内を interval 刻みで作り、施術時間ぶん収まり、busy（予約済み）と重ならない枠だけ available=true。
function computeSlots(dateStr, busy){
  var openMin=storeOpenMin(), closeMin=storeCloseMin(), interval=storeInterval();
  var dur=(st.menuDur&&st.menuDur>0)?st.menuDur:60;
  var now=Date.now();
  var out=[];
  for(var mins=openMin; mins+dur<=closeMin; mins+=interval){
    var hh=p2(Math.floor(mins/60)), mm=p2(mins%60), t=hh+':'+mm;
    var s=new Date(dateStr+'T'+t+':00+09:00').getTime(), e=s+dur*60000;
    var future=s>now; // 過去時刻は出さない（当日用）
    var free=future && busy.every(function(b){ return e<=b[0] || s>=b[1]; });
    out.push({ time:t, available:free });
  }
  return out;
}

// ===== STEP 4: 時間選択 =====
function s4(){
  var pts=st.date.split('-'), dd=new Date(+pts[0],+pts[1]-1,+pts[2]);
  var dl=+pts[1]+'月'+parseInt(pts[2])+'日（'+DOW[dd.getDay()]+'）';
  var h='<div class="s-title">時間を選んでください</div><div class="dt-lbl">'+dl+'</div>';
  if(st.slErr){
    h+='<div class="msg-err">空き枠を取得できませんでした。電波の良い場所で、もう一度お試しください。<div style="margin-top:10px"><button class="btn-retry" onclick="retrySl()">再試行</button></div></div>';
  }else if(st.slots===null){
    h+='<div class="ld-box"><span class="spinner"></span>空き枠を取得中…</div>';
    setTimeout(loadSl,0);
  }else{
    var anyA=st.slots.some(function(s){return s.available;});
    if(!anyA){
      h+='<div class="msg-err">この日は空き枠がありません。前の画面から別の日をお選びください。</div>';
    }else{
      h+='<div class="slot-grid">';
      st.slots.forEach(function(s){
        if(s.available){
          var sel=s.time===st.time?' sel':'';
          h+='<div class="slot-a'+sel+'" onclick="pickT(\''+s.time+'\')">'+s.time+'</div>';
        }else{
          h+='<div class="slot-x">—</div>';
        }
      });
      h+='</div>';
    }
  }
  document.getElementById('sc').innerHTML=h;
  document.getElementById('sn').innerHTML='<button class="btn btn-bk" onclick="go(2)">戻る</button><button class="btn btn-p" onclick="st.time&&go(4)" '+(st.time?'':'disabled')+'>次へ</button>';
}
function loadSl(){
  // セッション内キャッシュを優先。
  var ck=st.nurseId+'|'+st.menuId+'|'+st.date;
  if(st.slCache[ck]){ st.slots=st.slCache[ck]; st.slErr=false; if(st.step===3)s4(); return; }
  var reqN=st.nurseId, reqMn=st.menuId, reqD=st.date;
  var pFrom=reqD+'T00:00:00+09:00', pTo=reqD+'T23:59:59+09:00';
  sbRpc('busy_ranges',{ p_artist:reqN, p_from:pFrom, p_to:pTo }).then(function(r){
    var same=(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqMn)&&String(st.date)===String(reqD));
    if(!r.ok){ if(same){ st.slErr=true; if(st.step===3)s4(); } return; }
    var busy=(r.data||[]).map(function(x){ return [new Date(x.start_at).getTime(), new Date(x.end_at).getTime()]; });
    var arr=computeSlots(reqD, busy);
    st.slCache[reqN+'|'+reqMn+'|'+reqD]=arr;
    if(same){ st.slots=arr; st.slErr=false; if(st.step===3)s4(); }
  }).catch(function(){
    if(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqMn)&&String(st.date)===String(reqD)){
      st.slErr=true; if(st.step===3)s4();
    }
  });
}
// 「再試行」ボタン：エラー状態を解除して空き枠を取り直す。
function retrySl(){ st.slErr=false; st.slots=null; s4(); }
// 日付タップ時に裏で空き枠を先読みしておく（「次へ」を押す頃には表示済みにする）。
function prefetchSl(){
  if(!st.date) return;
  var ck=st.nurseId+'|'+st.menuId+'|'+st.date;
  if(st.slCache[ck]) return;  // 取得済みなら何もしない
  var reqN=st.nurseId, reqMn=st.menuId, reqD=st.date;
  var pFrom=reqD+'T00:00:00+09:00', pTo=reqD+'T23:59:59+09:00';
  sbRpc('busy_ranges',{ p_artist:reqN, p_from:pFrom, p_to:pTo }).then(function(r){
    if(!r.ok) return;
    var busy=(r.data||[]).map(function(x){ return [new Date(x.start_at).getTime(), new Date(x.end_at).getTime()]; });
    var arr=computeSlots(reqD, busy);
    st.slCache[reqN+'|'+reqMn+'|'+reqD]=arr;
    if(String(st.nurseId)===String(reqN)&&String(st.menuId)===String(reqMn)&&String(st.date)===String(reqD)&&st.slots===null&&st.step===3){ st.slots=arr; s4(); }
  }).catch(function(){});
}

function sr(k,v){ return '<div class="s-row"><div class="s-key">'+k+'</div><div class="s-val">'+v+'</div></div>'; }
function updSub(){ var b=document.getElementById('bsub'); if(b)b.disabled=!st.agreed; }
function doSub(){
  if(!st.agreed)return;
  // ★日付・時間が未選択なら送信しない（満席で枠を捨てた後などに null:00 で送るのを防止）。時間選択へ戻す。
  if(!st.date || !st.time){
    var e0=document.getElementById('serr'); if(e0){e0.className='msg-err';e0.textContent='日付と時間をもう一度お選びください。';}
    go(3); return;
  }
  var btn=document.getElementById('bsub');
  if(btn){btn.disabled=true;btn.textContent='送信中…';}
  // 予約確定は create_public_reservation RPC に集約（店舗・担当・メニューの正当性／席数／重複をDB側で検証）。
  var startISO=st.date+'T'+st.time+':00+09:00';
  var treatmentType=(st.menuName&&st.menuName.indexOf('再来')>=0)?'retouch':'new';
  var reservationType=(st.coupon==='none')?'normal':'monitor';
  // メモにクーポン種別・施術経験も残す（GAS版の補足情報を引き継ぐ）。
  var memo=buildMemo();
  sbRpc('create_public_reservation',{
    p_store: STORE_ID,
    p_artist: st.nurseId,
    p_menu: st.menuId,
    p_customer_name: st.custName,
    p_start: startISO,
    p_treatment_type: treatmentType,
    p_reservation_type: reservationType,
    p_line_uid: (st.uid || null),
    p_phone: st.phone,
    p_furigana: st.furigana,
    p_memo: memo,
    p_ref: (REF || null),
    p_coupon: (st.coupon || 'none'),
    p_art_experience: (st.artExp || '')
  }).then(function(r){
    if(r.ok){
      // 通知はDBトリガ→notify-reservation が内部トークンで実行（クライアントからは送らない＝なりすまし/改ざん対策）。
      showScr('s-done');
      // ★LINEの中で開いた時だけ自動でトークへ戻す。ブラウザでは戻り先が無いので、戻るボタンも隠す。
      if(inLineClient()){ setTimeout(backToTalk,1200); }
      else { var _bb=document.getElementById('backBtn'); if(_bb) _bb.style.display='none'; }
      return;
    }
    var code=(r.data&&r.data.code)||'', msg=(r.data&&r.data.message)||'';
    // 重複（排他制約 23P01）・満席（seat_full）→「埋まりました」案内＋枠再読込。
    if(String(r.status)==='409' || code==='23P01' || msg==='seat_full' || /no_overlap|overlap|exclusion/i.test(msg)){
      subFail(btn,'その時間帯はちょうど埋まりました。お手数ですが、別の時間をお選びください。');
      // この枠は埋まったので、その日の空き枠と当月の空き日を捨て、時間選択画面へ戻して最新を取り直す。
      delete st.slCache[st.nurseId+'|'+st.menuId+'|'+st.date];
      st.slots=null; st.availDates=null; st.time=null;
      setTimeout(function(){ go(3); }, 1500);   // ★時間選択へ戻して再取得（null時間での再送を防ぐ）
    }else{
      subFail(btn, errR(code,msg));
    }
  }).catch(function(err){
    subFail(btn,'送信に失敗しました。電波の良い場所で再度お試しください。');
  });
}
function buildMemo(){
  // クーポン・施術経験は予約レコードの専用列(coupon/art_experience)に保存するため、ここはお客様メモのみ。
  return (st.memo && st.memo.trim()) ? st.memo.trim() : '';
}
function subFail(btn,msg){
  if(btn){btn.disabled=false;btn.textContent='この内容で予約する';}
  var e=document.getElementById('serr'); if(e){e.className='msg-err';e.textContent=msg;}
}
// create_public_reservation が raise した例外コード／メッセージをお客様向け文言に変換。
function errR(code,msg){
  msg=String(msg||'');
  if(/store_not_found|menu_not_in_tenant|artist_not_in_store|artist_menu_not_allowed/.test(msg))
    return 'ただいまこの組み合わせのご予約をお受けできません。お手数ですがトーク画面からお問い合わせください。';
  if(/seat_full/.test(msg))
    return '申し訳ございません。その時間帯は満席です。お手数ですが、別の日時でお試しください。';
  return '申し訳ございません、ただいまご予約をお受けできませんでした。お手数ですがトーク画面からご連絡ください。';
}
// （旧 fireNotify は廃止）予約通知は DBトリガ → notify-reservation が内部トークンで実行する。
// クライアントから公開キーで通知関数を叩く方式は、なりすまし/改ざん/スパムの温床のため撤去した。
// LIFFウィンドウを閉じてLINEのトークへ戻す。LINEアプリ外（通常ブラウザ）では何も起きない。
// LINEアプリの中で開いているか（LIFF in-client）。ブラウザでは false。
function inLineClient(){
  try{ return (typeof liff!=='undefined' && liff.isInClient && liff.isInClient()); }catch(e){ return false; }
}
function backToTalk(){
  // ★LINEの中で開いた時だけ closeWindow でトークへ戻す。
  //   ブラウザ（LINE外）では戻り先が無いので何もしない＝「外部アプリを開きますか」ポップアップを出さない。
  if(inLineClient()){ try{ liff.closeWindow(); }catch(e){} }
}

// キャンセルボタン（イベント委譲・data-* から取得＝注入対策）
document.addEventListener('click', function(e){
  var b=(e.target&&e.target.closest)?e.target.closest('.cl-x'):null;
  if(!b) return;
  var rid=b.getAttribute('data-rid'), dt=b.getAttribute('data-dt');
  if(!window.confirm((dt||'このご予約')+' をキャンセルします。よろしいですか？')) return;
  b.disabled=true; b.textContent='キャンセル中…';
  sbEdge('cancel',{p_resv:rid}).then(function(r){
    if(r&&r.ok){ showCancelDone(dt); return; }
    b.disabled=false; b.textContent='このご予約をキャンセル';
    var msg=(r&&r.data&&r.data.message)||'';
    if(/too_late/.test(msg)) window.alert('ご予約時間が近い／過ぎているため、Web上ではキャンセルできません。お手数ですが公式LINEのトークからご連絡ください。');

});

// canvas を画面幅に合わせて初期化し、指/マウスの描画ハンドラを付ける。
function setupConsentCanvas(){
  csCanvas=document.getElementById('consentCanvas');
  if(!csCanvas) return;
  // 表示サイズ（CSS）に内部解像度を合わせる。Retina対応で見た目をくっきりさせる。
  var rect=csCanvas.getBoundingClientRect();
  var dpr=window.devicePixelRatio||1;
  csCanvas.width=Math.round(rect.width*dpr);
  csCanvas.height=Math.round(rect.height*dpr);
  csCtx=csCanvas.getContext('2d');
  csCtx.setTransform(dpr,0,0,dpr,0,0); // 以降は CSS px 座標で描ける
  csCtx.fillStyle='#ffffff';
  csCtx.fillRect(0,0,rect.width,rect.height);
  csCtx.strokeStyle='#111111';
  csCtx.lineWidth=2.2;
  csCtx.lineCap='round';
  csCtx.lineJoin='round';
  csHasInk=false;

  // タッチ（指）。ページスクロールを止めるため preventDefault。
  csCanvas.addEventListener('touchstart', csTouchStart, { passive:false });
  csCanvas.addEventListener('touchmove',  csTouchMove,  { passive:false });
  csCanvas.addEventListener('touchend',   csTouchEnd,   { passive:false });
  csCanvas.addEventListener('touchcancel',csTouchEnd,   { passive:false });
  // マウス（PC確認用）。
  csCanvas.addEventListener('mousedown', csMouseDown);
  csCanvas.addEventListener('mousemove', csMouseMove);
  window.addEventListener('mouseup', csMouseUp);
}
// canvas 上の座標（CSS px）に変換。
function csPos(clientX, clientY){
  var rect=csCanvas.getBoundingClientRect();
  return { x:clientX-rect.left, y:clientY-rect.top };
}
function csBegin(x,y){ csDrawing=true; csLastX=x; csLastY=y; }
function csStroke(x,y){
  if(!csDrawing||!csCtx) return;
  csCtx.beginPath();
  csCtx.moveTo(csLastX,csLastY);
  csCtx.lineTo(x,y);
  csCtx.stroke();
  // 点（タップだけ）でも痕が残るように小さな点を打つ
  csCtx.beginPath(); csCtx.arc(x,y,1.1,0,Math.PI*2); csCtx.fillStyle='#111111'; csCtx.fill();
  csLastX=x; csLastY=y; csHasInk=true; updateConsentSubmit();
}
function csTouchStart(e){ e.preventDefault(); if(!e.touches.length)return; var p=csPos(e.touches[0].clientX,e.touches[0].clientY); csBegin(p.x,p.y); csStroke(p.x,p.y); }
function csTouchMove(e){ e.preventDefault(); if(!csDrawing||!e.touches.length)return; var p=csPos(e.touches[0].clientX,e.touches[0].clientY); csStroke(p.x,p.y); }
function csTouchEnd(e){ e.preventDefault(); csDrawing=false; }
function csMouseDown(e){ var p=csPos(e.clientX,e.clientY); csBegin(p.x,p.y); csStroke(p.x,p.y); }
function csMouseMove(e){ if(!csDrawing)return; var p=csPos(e.clientX,e.clientY); csStroke(p.x,p.y); }
function csMouseUp(){ csDrawing=false; }

// 署名を消す（白で塗り直す）。
function clearConsentCanvas(){
  if(!csCanvas||!csCtx) return;
  var rect=csCanvas.getBoundingClientRect();
  csCtx.fillStyle='#ffffff';
  csCtx.fillRect(0,0,rect.width,rect.height);
  csHasInk=false;
  csDrawing=false;
  var err=document.getElementById('csSubmitErr'); if(err){ err.className='cs-submit-err'; err.textContent=''; }
  updateConsentSubmit();
}
// 署名が空なら送信ボタンを無効化。
function updateConsentSubmit(){
  var b=document.getElementById('csSubmit'); if(b) b.disabled=!csHasInk;
}

// 署名送信：submit_consent RPC。成功で完了画面、失敗は日本語で再試行可能に。
function submitConsentForm(){
  if(!csHasInk){ return; }
  if(!st.idToken){
    // 本人確認トークンが無い（LINE外/openid未許可）→ LINEから開き直しを促す（#92）
    var e0=document.getElementById('csSubmitErr');
    if(e0){ e0.className='msg-err'; e0.textContent='本人確認ができませんでした。公式LINEのトーク画面から開き直してお試しください。'; }
    return;
  }
  var btn=document.getElementById('csSubmit');
  var err=document.getElementById('csSubmitErr');
  if(err){ err.className='cs-submit-err'; err.textContent=''; }
  var dataUrl;
  try{ dataUrl=csCanvas.toDataURL('image/png'); }
  catch(e){ if(err){ err.className='msg-err'; err.textContent='署名の取得に失敗しました。お手数ですが書き直してお試しください。'; } return; }
  // ★送信前にサイズチェック（高DPR端末などで署名画像が大きくなりすぎる無駄な送信を防ぐ）
  if(!dataUrl || dataUrl.length > 2000000){ if(err){ err.className='msg-err'; err.textContent='署名のデータが大きすぎます。「書き直す」でやり直してから送信してください。'; } return; }
  if(btn){ btn.disabled=true; btn.textContent='送信中…'; }
  sbEdge('consent',{
    p_customer_name: (st.displayName||''),
    p_tv_full: consentPhoto.tv_full,
    p_tv_part: consentPhoto.tv_part,
    p_sns_full: consentPhoto.sns_full,
    p_sns_part: consentPhoto.sns_part,
    p_signature: dataUrl,
    p_version: CONSENT_VERSION
  }).then(function(r){
    if(r&&r.ok){ showConsentDone(); return; }
    consentSubmitFail(btn, consentErrMsg(r));
  }).catch(function(){
    consentSubmitFail(btn,'送信に失敗しました。電波の良い場所で、もう一度お試しください。');
  });
}
// submit_consent の失敗メッセージ（no_uid/no_signature/signature_too_large 等）を日本語へ。
function consentErrMsg(r){
  var msg=(r&&r.data&&(r.data.message||r.data.hint))||'';
  msg=String(msg);
  if(/signature_too_large/.test(msg)) return '署名が大きすぎます。お手数ですが「書き直す」でやり直してから送信してください。';
  if(/no_signature/.test(msg))        return '署名が空のようです。枠内にご署名のうえ、もう一度お試しください。';
  if(/bad_signature/.test(msg))       return '署名データを読み取れませんでした。「書き直す」でやり直してお試しください。';
  if(/no_uid/.test(msg))              return 'お客様の確認ができませんでした。公式LINEのトーク画面から開き直してお試しください。';
  if(/no_tenant/.test(msg))           return '設定エラーが発生しました。お手数ですが公式LINEのトークからご連絡ください。';
  if(/no_reservation/.test(msg))      return 'ご予約が確認できませんでした。先にご予約のうえ、ご来店時にスタッフへお声がけください。';
  return '署名の送信に失敗しました。お手数ですが、もう一度お試しください。';
}
function consentSubmitFail(btn, msg){
  if(btn){ btn.disabled=false; btn.textContent='同意して署名を送信'; }
  var err=document.getElementById('csSubmitErr');
  if(err){ err.className='msg-err'; err.textContent=msg; window.scrollTo(0,document.body.scrollHeight); }
}
// 送信完了画面（LINEのトークへ戻るボタン）。固定フッターは隠す。
function showConsentDone(){
  var body=document.getElementById('consentBody'); if(!body) return;
  var nav=document.getElementById('csNav'); if(nav) nav.style.display='none';
  body.innerHTML='<div class="soon-box cs-done"><div class="done-icon">✅</div><div class="done-title">同意書を受け付けました</div><div class="done-msg">ご署名ありがとうございました。<br>当日はお気をつけてお越しください。</div><button class="btn btn-p" onclick="backToTalk()" style="display:inline-block;margin-top:24px;padding-left:36px;padding-right:36px;">LINEのトークに戻る</button></div>';
}

// ===== Supabase からマスタ＋店舗設定を取得し、GAS版 options 互換の形へ組み立て =====
// 互換キー：options = { nurses:[{nurse_id,name,is_active,profile_photo_url}],
//   menus:[{menu_id,menu_name,normal_price,monitor_price}],
//   certified:[{nurse_id,menu_id,is_certified,duration_new_min,duration_retouch_min}],
//   store_name, openMin, closeMin, interval, closed }
function loadOptions(){
  Promise.all([
    sbGet("artists?select=id,name,is_active,profile_photo_url,qualification,specialty&store_id=eq."+STORE_ID+"&is_active=eq.true&order=name"),
    sbGet("menus?select=id,name,price_normal,price_monitor,duration_new_min,duration_retouch_min&tenant_id=eq."+TENANT_ID+"&is_active=eq.true"),
    sbGet("artist_menus?select=artist_id,menu_id,duration_new_min,duration_retouch_min&is_certified=eq.true"),
    sbGet("stores?select=name,business_hours_start,business_hours_end,slot_interval_min,closed_days&id=eq."+STORE_ID)
  ]).then(function(res){
    // ★Array.isArray でガード（RLS/列名ミスでエラーJSONが返っても .map で落ちない）
    var artists=(res[0]&&Array.isArray(res[0].data))?res[0].data:[];
    var menus  =(res[1]&&Array.isArray(res[1].data))?res[1].data:[];
    var am     =(res[2]&&Array.isArray(res[2].data))?res[2].data:[];
    var store=(res[3]&&Array.isArray(res[3].data)&&res[3].data[0])||null;
    if(!artists.length){ bootOptDone=true; showWizardIfReady(); return; }

    // 担当できるメニューだけを artist_menus で絞る（poc/index.html boot() と同じ考え方）。
    // 施術時間は artist_menus の duration を優先。
    var nurses=artists.map(function(a){
      return { nurse_id:a.id, name:a.name, is_active:a.is_active, profile_photo_url:a.profile_photo_url||'',
               qualification:a.qualification||'', specialty:a.specialty||'' };
    });
    var menusC=menus.map(function(m){
      return { menu_id:m.id, menu_name:m.name, normal_price:m.price_normal, monitor_price:m.price_monitor,
               _dnew:m.duration_new_min, _dret:m.duration_retouch_min };
    });
    var certified=am.map(function(p){
      // artist_menus に duration が無ければ menus 側を使う。
      var mm=menusC.filter(function(x){return String(x.menu_id)===String(p.menu_id);})[0]||{};
      return {
        nurse_id:p.artist_id, menu_id:p.menu_id, is_certified:true,
        duration_new_min:(p.duration_new_min!=null?p.duration_new_min:mm._dnew),
        duration_retouch_min:(p.duration_retouch_min!=null?p.duration_retouch_min:mm._dret)
      };
    });

    var openMin=hmToMin(store&&store.business_hours_start, DEF_OPEN_H*60);
    var closeMin=hmToMin(store&&store.business_hours_end, DEF_CLOSE_H*60);
    var interval=(store&&store.slot_interval_min&&store.slot_interval_min>0)?store.slot_interval_min:DEF_INTERVAL;

    bootOpt={
      nurses:nurses, menus:menusC, certified:certified,
      store_name:(store&&store.name)||'',
      openMin:openMin, closeMin:closeMin, interval:interval,
      closed:parseClosed(store&&store.closed_days)
    };
    bootOptDone=true;
    if(wizardShown){ st.options=bootOpt; updHeader(); if(MODE==='book'&&st.step===1) render(); }
    else showWizardIfReady();
  }).catch(function(){
    bootOptDone=true; if(!wizardShown) showWizardIfReady();
  });
}

// ===== LIFF：本人(UID・表示名)を取得（LINE内で開いたときだけ。失敗しても予約は続行） =====
function initLiff(){
  if(!LIFF_ID || typeof liff==='undefined'){ profileDone(); return; }
  var advanced=false;
  var tid=setTimeout(function(){ if(!advanced){ advanced=true; profileDone(); } },8000);
  function advance(){ if(advanced)return; advanced=true; clearTimeout(tid); profileDone(); }
  function applyLateProfile(p){
    if(!p) return;
    if(p.userId)      st.uid=p.userId;
    if(p.displayName) st.displayName=p.displayName;
    updHeader();
  }
  try{
    liff.init({liffId:LIFF_ID}).then(function(){
      if(!liff.isLoggedIn||!liff.isLoggedIn()){ advance(); return; }
      // ★#92：本人確認用のIDトークンを取得（openidスコープが必要）。キャンセル/同意書で使う。
      try{ st.idToken = (liff.getIDToken && liff.getIDToken()) || ''; }catch(e){ st.idToken=''; }
      liff.getProfile().then(function(p){ applyLateProfile(p); })
                       .catch(function(){})
                       .then(advance);
    }).catch(function(){ advance(); });
  }catch(e){ advance(); }
}

(function boot(){
  // 予約モードのみマスタ取得（キャンセルは自分の予約一覧をUID確定後に取得・同意書は準備中）。
  if(MODE==='book') loadOptions();
  initLiff();
  // 予約以外（キャンセル/同意書）は即この画面を表示（キャンセルは続いてUID確定後に一覧取得）。
  if(MODE!=='book') showWizardIfReady();
})();
</script>
