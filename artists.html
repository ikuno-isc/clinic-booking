<!DOCTYPE html>
<!--
  poc/artists.html — お客様向け「症例写真ページ」（Supabase版・公開ページ）。
  ねらい：リッチメニュー「症例写真」→ このページ。上にアーティストのタブ（丸顔＋名前）、
          下にそのアーティストの症例写真スライド、一番下に「このアーティストで予約する」。
          経歴・口コミは載せない（口コミはリッチメニューの別ボタン＝chat-webhook の自動返信で完結）。

  ・店解決は予約ページ(index.html)と同じ public_store_resolve(slug)。?store= で店舗slug切替（既定 kurume）。
  ・データは公開RPCのみで取得（anonに生テーブルは開けない）：
      一覧       … public_artist_list(p_store_id)
      症例写真   … public_artist_profile(p_store_id, p_artist_id) の photos を使う（career/reviews は使わない）
  ・XSS対策：自由入力(caption等)は必ず esc()。画像URLは https:// か Supabase Storage 公開URL のみ許可（safeImg）。
  ・「予約する」は予約ページ(new.html?store=...)へ遷移。施術者を初期選択する artist パラメータも付ける。
  ・GitHub Pages で配信する純粋な静的HTML（外部依存なし）。LIFFは不要（公開閲覧のみ・PIIを扱わない）。
-->
<html lang="ja">
<head>
  <base target="_top">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <!-- H5 Phase2小粒：CSP（enforcing）。GitHub Pagesは独自HTTPヘッダ不可のためmetaで設定。
       実リソース監査（2026-06-11）に基づく許可リスト：
       ・外部scriptなし（LIFF不使用）→ LINE系ドメインは一切不要。インラインJSは 'unsafe-inline' で許容（撤去はPhase2本丸）
       ・connect-src: fetchは Supabase（公開RPC）のみ
       ・img-src    : アーティスト写真・症例写真＝Supabase Storage 公開URL（safeImgでhttpsのみ許可済み・実データはStorage）
       ・frame-ancestors / report-uri は meta では効かない → クリックジャッキングは下のJSフレームバスティングで代替 -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://stgarheuldubyrzdqzaq.supabase.co; connect-src 'self' https://stgarheuldubyrzdqzaq.supabase.co; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <style id="fbGuard">body{display:none !important}</style>
  <script>
  // クリックジャッキング対策（GitHub PagesはX-Frame-Options等のHTTPヘッダ不可のためJSで代替）。
  // OWASP推奨方式：通常表示なら上の隠しstyleを外す／枠(iframe)内なら本文を隠したまま離脱を試みる。
  // sandbox属性で離脱(top.location)を封じられても本文が見えないため、クリックの騙し取りが成立しない。
  if(self===top){var fbg=document.getElementById('fbGuard');if(fbg)fbg.parentNode.removeChild(fbg);}
  else{top.location=self.location;}
  // CSP違反の観測（consoleに記録するだけ。外部送信はしない）
  document.addEventListener('securitypolicyviolation',function(e){console.warn('CSP違反:',e.violatedDirective,e.blockedURI)});
  </script>
  <title>症例写真</title>
  <style>
    /* ===== デザイントークン（予約ページ new.html と同テーマ・2026-06-12 UI刷新）===== */
    :root {
      --bg: #faf7f3;
      --surface: #ffffff;
      --ink: #3d3430;
      --muted: #8c8076;
      --brand: #a8705c;
      --brand-deep: #8c5547;
      --brand-grad: linear-gradient(135deg, #8c5547, #a8705c);
      --brand-soft: #f8efe9;
      --brand-line: #e8d6cb;
      --gold: #c5a572;
      --line: #eee3da;
      --serif: 'Hiragino Mincho ProN','Yu Mincho','Noto Serif JP',serif;
    }
    *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:-apple-system,'Hiragino Kaku Gothic ProN','Yu Gothic',sans-serif; background:var(--bg); color:var(--ink); line-height:1.6; }
    .app-hd { background:var(--brand-grad); color:#fff; padding:15px 18px 13px; border-bottom:3px solid var(--gold); }
    .app-hd h1 { font-size:17px; font-weight:600; font-family:var(--serif); letter-spacing:.14em; }
    .app-hd .sub { font-size:11.5px; opacity:.85; margin-top:2px; letter-spacing:.05em; }
    .wrap { max-width:600px; margin:0 auto; }

    /* ローディング/エラー */
    #loading { min-height:60vh; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--muted); font-size:14px; }
    .spinner { width:26px; height:26px; border:3px solid #ece1d7; border-top-color:var(--brand); border-radius:50%; animation:spin .8s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .msg-err { background:#fdecea; color:#b3261e; padding:14px; border-radius:10px; font-size:13px; line-height:1.7; margin:16px; }
    .empty { text-align:center; color:var(--muted); padding:48px 16px; font-size:14px; }

    /* ===== アーティストタブ（丸顔＋名前・横スクロール） ===== */
    .tabs-wrap { background:var(--surface); border-bottom:1px solid var(--line); position:sticky; top:0; z-index:5; }
    .tabs { display:flex; gap:6px; overflow-x:auto; -webkit-overflow-scrolling:touch; padding:12px 14px; scrollbar-width:none; }
    .tabs::-webkit-scrollbar { display:none; }
    .tab { flex:0 0 auto; display:flex; flex-direction:column; align-items:center; gap:6px; width:74px; padding:6px 4px 8px; border:none; background:transparent; cursor:pointer; border-radius:12px; }
    .tab-av { width:54px; height:54px; border-radius:50%; overflow:hidden; display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; color:#fff; border:2px solid transparent; transition:border-color .15s; box-shadow:0 1px 6px rgba(140,85,71,.10); }
    .tab-av img { width:100%; height:100%; object-fit:cover; }
    .tab-nm { font-size:12px; color:#857a70; font-weight:600; line-height:1.25; text-align:center; word-break:break-word; }
    .tab.active .tab-av { border-color:var(--brand); }
    .tab.active .tab-nm { color:var(--brand-deep); font-weight:800; }

    /* 本文 */
    .body { padding:18px 16px 24px; min-height:36vh; }
    .lead { text-align:center; font-size:13px; color:#7d7268; margin-bottom:14px; }
    .lead b { color:var(--brand-deep); font-family:var(--serif); font-size:15px; letter-spacing:.04em; }

    /* 症例写真スライド（横スワイプ・カルーセル） */
    .sec-h { font-size:14px; font-weight:700; color:var(--brand-deep); border-left:3px solid var(--gold); padding-left:9px; margin-bottom:12px; letter-spacing:.04em; }
    .caro { display:flex; gap:12px; overflow-x:auto; scroll-snap-type:x mandatory; -webkit-overflow-scrolling:touch; overscroll-behavior-x:contain; padding:2px 2px 10px; }
    .caro::-webkit-scrollbar { height:4px; }
    .caro::-webkit-scrollbar-thumb { background:#dccdc0; border-radius:2px; }
    .ph { scroll-snap-align:start; flex:0 0 78%; background:var(--surface); border:1px solid var(--brand-line); border-radius:14px; overflow:hidden; box-shadow:0 2px 8px rgba(140,85,71,.06); }
    .ph img { width:100%; aspect-ratio:1; object-fit:cover; display:block; background:#f4ede6; }
    .ph-cap { font-size:12px; color:#6b6058; padding:8px 10px; line-height:1.5; }
    .ph-pair { flex:0 0 88%; }
    .ph-pair .pair-row { display:flex; }
    .ph-pair .pair-col { flex:1; }
    .ph-pair .pair-col img { aspect-ratio:1; }
    .ph-lbl { font-size:11px; font-weight:700; color:#fff; background:rgba(61,52,48,.55); padding:2px 8px; border-radius:0 0 6px 0; position:absolute; }
    .ph-pos { position:relative; }
    .med-note { font-size:11px; color:var(--muted); margin-top:10px; line-height:1.6; }
    .nophoto { text-align:center; color:var(--muted); padding:40px 12px; font-size:14px; background:var(--surface); border:1px dashed #ddc9bb; border-radius:14px; }

    /* 予約バー（画面下に固定） */
    .book-bar { position:sticky; bottom:0; background:rgba(255,255,255,.96); border-top:1px solid var(--line); padding:12px 16px; box-shadow:0 -4px 16px rgba(61,52,48,.06); }
    .btn { display:block; width:100%; padding:14px; font-size:16px; font-weight:700; border-radius:14px; border:none; cursor:pointer; text-decoration:none; text-align:center; background:var(--brand-grad); color:#fff; letter-spacing:.04em; box-shadow:0 4px 14px rgba(140,85,71,.28); }
  </style>
</head>
<body>

<div id="loading"><div class="spinner"></div><div>読み込み中…</div></div>
<div id="app" style="display:none;">
  <div class="app-hd"><h1>症例写真</h1><div class="sub" id="hdSub"></div></div>
  <div class="wrap">
    <div class="tabs-wrap"><div class="tabs" id="tabs"></div></div>
    <div class="body" id="body"></div>
    <div class="book-bar"><a class="btn" id="bookBtn" href="#">予約する</a></div>
  </div>
</div>

<script>
// ===== Supabase 接続設定（公開キー＝埋め込みOK・RLS/公開RPCで保護） =====
var SB_URL  = "https://stgarheuldubyrzdqzaq.supabase.co";
var SB_KEY  = "sb_publishable_e5A9MJzOCvzsfWXBd9DLzg_Wa_hJ0qb";
// ↓既定（久留米）。起動時に public_store_resolve(?store=) で上書きされる。
var STORE_ID   = "22222222-0000-0000-0000-000000000001";
var TENANT_ID  = "11111111-1111-1111-1111-111111111111";
var STORE_NAME = "久留米";

// LIFFは元のクエリを ?liff.state=... に包む場合があるので両方を見る（index.html と同じ作法）。
function getQueryParam(name){
  try{
    var sp = new URLSearchParams(location.search);
    var v = sp.get(name);
    if(v) return v;
    var ls = sp.get('liff.state');
    if(ls){
      var inner = new URLSearchParams(ls.charAt(0)==='?' ? ls.slice(1) : ls);
      var v2 = inner.get(name);
      if(v2) return v2;
    }
  }catch(e){}
  return null;
}
var STORE_RAW   = getQueryParam('store');
var STORE       = STORE_RAW || 'kurume';
var INIT_ARTIST = getQueryParam('artist');   // 最初に開くアーティスト（任意）

var H = { "apikey": SB_KEY, "Authorization": "Bearer " + SB_KEY };
function sbRpc(fn, args){
  return fetch(SB_URL + "/rest/v1/rpc/" + fn, {
    method:"POST",
    headers: Object.assign({ "Content-Type":"application/json" }, H),
    body: JSON.stringify(args||{})
  }).then(function(r){
    return r.json().then(function(j){ return { ok:r.ok, status:r.status, data:j }; },
                        function(){ return { ok:r.ok, status:r.status, data:null }; });
  });
}

// ===== ユーティリティ =====
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
// ★画像URLは https:// か Supabase Storage 公開URL のみ許可（javascript: 等の注入・http混在を弾く）。
function safeImg(u){
  if(!u) return '';
  var s = String(u).trim();
  if(/^https:\/\//i.test(s)) return s;   // https の公開URL（Storage公開配信もここに含まれる）
  return '';                              // それ以外（http:, data:, javascript: 等）は出さない
}
// 写真未設定時の頭文字アイコン背景色（テーマに合わせた暖色系・2026-06-12 UI刷新）
var AC = ['#b98a74','#a8705c','#8c5547','#c5a572','#9d7e6b','#b3826f'];
function avHtml(url, name, idx, avcls){
  var img = safeImg(url);
  if(img) return '<div class="'+avcls+'"><img src="'+esc(img)+'" alt="'+esc(name)+'"></div>';
  var ch = esc((name||'?').charAt(0).toUpperCase());
  return '<div class="'+avcls+'" style="background:'+AC[idx%AC.length]+'">'+ch+'</div>';
}
function show(id){
  document.getElementById('loading').style.display = (id==='loading')?'flex':'none';
  document.getElementById('app').style.display = (id==='app')?'block':'none';
}
function errBox(msg){
  show('app');
  document.getElementById('tabs').innerHTML = '';
  document.getElementById('body').innerHTML = '<div class="msg-err">'+esc(msg)+'</div>';
  document.getElementById('bookBtn').style.display = 'none';
}

// 予約ページURL（new.html?store=...）。施術者を初期選択する artist も付ける（任意）。
function bookUrl(artistId){
  var u = 'new.html?store=' + encodeURIComponent(STORE);
  if(artistId) u += '&artist=' + encodeURIComponent(artistId);
  return u;
}

// ===== 状態 =====
var ARTISTS = [];        // public_artist_list の結果
var PROFILE_CACHE = {};  // artist_id -> profile（症例写真を一度取ったらキャッシュ）
var CURRENT = null;      // 選択中の artist_id

// ===== タブ描画 =====
function renderTabs(){
  var tabs = document.getElementById('tabs');
  var h = '';
  ARTISTS.forEach(function(a, i){
    var cls = (a.id === CURRENT) ? 'tab active' : 'tab';
    h += '<button class="'+cls+'" data-artist="'+esc(a.id)+'">';
    h += avHtml(a.profile_photo_url, a.name, i, 'tab-av');
    h += '<span class="tab-nm">'+esc(a.name)+'</span>';
    h += '</button>';
  });
  tabs.innerHTML = h;
}

// 症例写真の描画。pair_key が同じ before/after は左右ペアで、それ以外は単発スライドで出す。
function renderPhotos(photos){
  if(!photos || !photos.length){
    return '<div class="nophoto">このアーティストの症例写真は準備中です🙏</div>';
  }
  var pairs = {}, order = [];
  photos.forEach(function(p){
    var key = p.pair_key ? ('pair:'+p.pair_key) : ('single:'+order.length);
    if(!pairs[key]){ pairs[key] = []; order.push(key); }
    pairs[key].push(p);
  });
  var h = '<div class="caro">';
  var shown = 0;
  order.forEach(function(key){
    var grp = pairs[key];
    var before = null, after = null;
    grp.forEach(function(p){ if(p.kind==='before') before=p; else if(p.kind==='after') after=p; });
    if(key.indexOf('pair:')===0 && before && after){
      var bi = safeImg(before.image_url), ai = safeImg(after.image_url);
      if(!bi || !ai){ return; }   // 片方でも不正URLなら出さない
      h += '<div class="ph ph-pair"><div class="pair-row">';
      h += '<div class="pair-col ph-pos"><span class="ph-lbl">Before</span><img src="'+esc(bi)+'" alt="before"></div>';
      h += '<div class="pair-col ph-pos"><span class="ph-lbl">After</span><img src="'+esc(ai)+'" alt="after"></div>';
      h += '</div>';
      var cap = (after && after.caption) || (before && before.caption) || '';
      if(cap) h += '<div class="ph-cap">'+esc(cap)+'</div>';
      h += '</div>';
      shown++;
    }else{
      grp.forEach(function(p){
        var img = safeImg(p.image_url);
        if(!img) return;
        h += '<div class="ph">';
        if(p.kind==='before' || p.kind==='after'){
          h += '<div class="ph-pos"><span class="ph-lbl">'+(p.kind==='before'?'Before':'After')+'</span><img src="'+esc(img)+'" alt="'+esc(p.kind)+'"></div>';
        }else{
          h += '<img src="'+esc(img)+'" alt="症例">';
        }
        if(p.caption) h += '<div class="ph-cap">'+esc(p.caption)+'</div>';
        h += '</div>';
        shown++;
      });
    }
  });
  h += '</div>';
  if(!shown) return '<div class="nophoto">このアーティストの症例写真は準備中です🙏</div>';
  h += '<div class="med-note">※効果には個人差があります。掲載写真はご本人の同意を得たものです。</div>';
  return h;
}

// ===== アーティスト選択 → 症例写真を表示 =====
function selectArtist(artistId){
  CURRENT = artistId;
  renderTabs();
  var a = null;
  ARTISTS.forEach(function(x){ if(x.id===artistId) a = x; });
  var nm = a ? a.name : '';
  // 予約ボタン更新
  var btn = document.getElementById('bookBtn');
  btn.style.display = 'block';
  btn.textContent = (nm ? nm + ' さんで予約する' : '予約する');
  btn.setAttribute('href', bookUrl(artistId));

  var body = document.getElementById('body');
  body.innerHTML = '<div class="lead"><b>'+esc(nm)+'</b> さんの症例写真</div><div class="sec-h">症例写真</div><div style="text-align:center;color:#aaa;padding:24px;">読み込み中…</div>';

  if(PROFILE_CACHE[artistId]){
    paintCases(nm, PROFILE_CACHE[artistId]);
    return;
  }
  sbRpc('public_artist_profile', { p_store_id: STORE_ID, p_artist_id: artistId }).then(function(r){
    if(r.ok && r.data) PROFILE_CACHE[artistId] = r.data;   // 取得できたらキャッシュ（描画しなくても保存しておく）
    if(CURRENT !== artistId) return;                        // ★古い応答は捨てる：タブを素早く切替えた時に別アーティストの写真で上書きしない（Codex P2）
    if(!r.ok || !r.data){ body.innerHTML = '<div class="nophoto">情報を取得できませんでした。もう一度お試しください。</div>'; return; }
    paintCases(nm, r.data);
  }).catch(function(){ if(CURRENT !== artistId) return; body.innerHTML = '<div class="nophoto">情報を取得できませんでした。もう一度お試しください。</div>'; });
}
function paintCases(nm, profile){
  var photos = (profile && profile.photos) || [];
  var body = document.getElementById('body');
  var h = '<div class="lead"><b>'+esc(nm)+'</b> さんの症例写真</div>';
  h += '<div class="sec-h">症例写真</div>';
  h += renderPhotos(photos);
  body.innerHTML = h;
}

// ===== 一覧取得 =====
function loadArtists(){
  show('loading');
  sbRpc('public_artist_list', { p_store_id: STORE_ID }).then(function(r){
    if(!r.ok){ errBox('情報を取得できませんでした。電波の良い場所で、もう一度お試しください。'); return; }
    ARTISTS = Array.isArray(r.data) ? r.data : [];
    document.getElementById('hdSub').textContent = STORE_NAME;
    if(!ARTISTS.length){
      show('app');
      document.getElementById('tabs').innerHTML = '';
      document.getElementById('body').innerHTML = '<div class="empty">現在ご案内できるアーティストがいません。</div>';
      document.getElementById('bookBtn').style.display = 'none';
      return;
    }
    show('app');
    // 初期選択：?artist= が一覧にあればそれ、なければ先頭。
    var first = ARTISTS[0].id;
    if(INIT_ARTIST){
      ARTISTS.forEach(function(x){ if(x.id===INIT_ARTIST) first = INIT_ARTIST; });
    }
    selectArtist(first);
  }).catch(function(){ errBox('情報を取得できませんでした。電波の良い場所で、もう一度お試しください。'); });
}

// ===== クリック（イベント委譲。タブ押下でアーティスト切替） =====
document.addEventListener('click', function(e){
  var t = e.target && e.target.closest ? e.target.closest('[data-artist]') : null;
  if(t){ e.preventDefault(); selectArtist(t.getAttribute('data-artist')); }
});

// ===== 起動 =====
(function boot(){
  function fallbackOk(){ return (!STORE_RAW || STORE_RAW==='kurume'); }
  sbRpc('public_store_resolve', { p_slug: STORE }).then(function(res){
    var s = (res && res.ok && res.data && typeof res.data==='object') ? res.data : null;
    if(s){
      if(s.id)        STORE_ID   = s.id;
      if(s.tenant_id) TENANT_ID  = s.tenant_id;
      if(s.name)      STORE_NAME = s.name;
    }else if(!fallbackOk()){
      // 明示された別店が見つからない → 久留米へ倒さずエラー（誤った店の情報を出さない）。
      errBox('お店が見つかりませんでした。お店の公式LINEのメニューから、もう一度お試しください。');
      return;
    }
    loadArtists();
  }).catch(function(){
    if(!fallbackOk()){ errBox('お店が見つかりませんでした。'); return; }
    loadArtists();
  });
})();
</script>
</body>
</html>
